{{- /*
Sprint 3.14 (May 24, 2026): the websocket workload Pod's config is rendered
as a Dhall expression (`config.dhall`) per
@documents/engineering/config_doctrine.md §6@. The workload binary decodes
this file in-process via the native Haskell `dhall` library through
`Prodbox.Workload.Settings.loadWorkloadConfig`.

Sprint 3.13 chunks 11 + 28: the OIDC `client_secret` is read via
cross-namespace Helm `lookup` of the gateway-daemon-managed
`keycloak-oidc-clients` Secret. The keycloak release that registers
the @prodbox-websocket@ client and materializes the corresponding
`WEBSOCKET_CLIENT_SECRET` deploys via the vscode root chart's
transitive dep chain (vscode → keycloak → keycloak-postgres) into the
@vscode@ namespace, so that's the lookup namespace. On `helm template`
(no cluster) the lookup returns empty and the chart falls back to the
`.Values.oidc.clientSecret` placeholder.
*/}}
{{- $oidcSecret := lookup "v1" "Secret" "vscode" "keycloak-oidc-clients" }}
{{- $clientSecret := .Values.oidc.clientSecret }}
{{- if $oidcSecret }}
{{- $clientSecret = index $oidcSecret.data "WEBSOCKET_CLIENT_SECRET" | b64dec }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-config
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
data:
  config.dhall: |-
    { schemaVersion = 1
    , mode = < Api | Websocket >.Websocket
    , log_level = None Text
    , workload_port = Some {{ .Values.websocket.port }}
    , redis =
        Some
          { host = {{ .Values.redis.host | quote }}
          , port = {{ .Values.redis.port | quote }}
          }
    , oidc =
        Some
          { issuer = {{ .Values.oidc.issuer | quote }}
          , client_id = {{ .Values.oidc.clientId | quote }}
          , client_secret = {{ $clientSecret | quote }}
          , public_base_url = {{ .Values.oidc.publicBaseUrl | quote }}
          , token_endpoint = {{ .Values.oidc.tokenEndpoint | quote }}
          }
    }
