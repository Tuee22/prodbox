{{- if .Values.resourceGuardrails.enabled }}
apiVersion: v1
kind: ResourceQuota
metadata:
  name: keycloak-resource-quota
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  hard:
    {{- toYaml .Values.resourceGuardrails.quota.hard | nindent 4 }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: keycloak-limit-range
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  limits:
    - type: Container
      default:
        {{- toYaml .Values.resourceGuardrails.limitRange.default | nindent 8 }}
      defaultRequest:
        {{- toYaml .Values.resourceGuardrails.limitRange.defaultRequest | nindent 8 }}
{{- end }}
