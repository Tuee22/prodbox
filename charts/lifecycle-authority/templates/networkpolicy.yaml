{{- /*
Isolation policy for the retained home Lifecycle Authority. Egress is limited to
what the durable-journal + Model-B CAS coordinator actually needs — DNS, the
Vault API (transit lifecycle-aggregate/checkpoint + secret/lifecycle KV), the
in-cluster MinIO object store (Model-B CAS objects), and external HTTPS to AWS.
The authority has NO mesh or target-secret egress. Ingress is restricted to its
own namespace; kubelet liveness/readiness probes are node-local and unaffected.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: lifecycle-authority-isolation
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lifecycle-authority.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prodbox-lifecycle-authority
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
      ports:
        - protocol: TCP
          port: lifecycle
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prodbox-vault
      ports:
        - protocol: TCP
          port: 8200
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: prodbox
          podSelector:
            matchLabels:
              app.kubernetes.io/name: minio
      ports:
        - protocol: TCP
          port: 9000
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
