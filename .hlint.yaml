- arguments:
    - --cpp-simple
# Doctrine coverage markers consumed by `src/Prodbox/CheckCode.hs`:
# - Refactor nested case
# - Avoid case inside lambda body
# - forbid forkIO / unsafePerformIO / module-level IORef in daemon paths
# - forbid direct subprocess primitives: callProcess / readCreateProcess / createProcess / proc / shell
# - forbid direct terminal output outside Prodbox.CLI.Output: putStr / Text.IO.putStrLn / hPutStrLn stderr
# - forbid inline daemon log objects: Aeson.object / Aeson.fromList
# - forbid daemon readiness markers: sd_notify / READY=1 / readiness_marker / ready_file
# - forbid reload polling triggers: System.FSNotify / System.INotify / Linux.INotify / getModificationTime
# - forbid module-local mutable metrics: newIORef / newMVar outside envMetrics
# - require daemon Async primitive set: withAsync / race / concurrently / replicateConcurrently
- ignore: {name: "Use fromMaybe"}
- ignore: {name: "Eta reduce"}
- ignore: {name: "Redundant bracket"}
- ignore: {name: "Use isJust"}
- ignore: {name: "Unused LANGUAGE pragma"}
- ignore: {name: "Use map with tuple-section"}
- ignore: {name: "Use $>"}
- ignore: {name: "Avoid lambda"}
- ignore: {name: "Use first"}
- ignore: {name: "Use newtype instead of data"}
- ignore: {name: "Use uncurry"}
- ignore: {name: "Replace case with maybe"}
- ignore: {name: "Use when"}
- ignore: {name: "Use infix"}
- ignore: {name: "Use fromRight"}
- ignore: {name: "Use catMaybes"}
- ignore: {name: "Use const"}
- ignore: {name: "Use lefts"}
- ignore: {name: "Use join"}
- ignore: {name: "Avoid lambda using `infix`"}
- ignore: {name: "Use <&>"}
- ignore: {name: "Use isNothing"}
- ignore: {name: "Use isAsciiLower"}
- ignore: {name: "Use let"}
- ignore: {name: "Use lambda-case"}
- ignore: {name: "Use fmap"}
- ignore: {name: "Use isDigit"}
- ignore: {name: "Hoist not"}
- ignore: {name: "Use any"}
- ignore: {name: "Use concatForM"}
- ignore: {name: "Use drop1"}
- ignore: {name: "Use eitherToMaybe"}
- ignore: {name: "Use lower"}
- ignore: {name: "Use mapLeft"}
- ignore: {name: "Use trimEnd"}
- ignore: {name: "Use trimStart"}
- ignore: {name: "Use whenJust"}
- ignore: {name: "Use zipFrom"}
- ignore: {name: "Use zipWithFrom"}
- ignore: {name: "Use <$>"}
