apiVersion: v1
kind: Service
metadata:
  name: keycloak-postgres
  labels:
    {{- include "keycloak-postgres.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: keycloak-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
