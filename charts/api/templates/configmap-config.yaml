{{- /*
Sprint 3.14 (May 24, 2026): the api workload Pod's config is rendered as a
Dhall expression (`config.dhall`) per
@documents/engineering/config_doctrine.md §6@. The workload binary decodes
this file in-process via the native Haskell `dhall` library through
`Prodbox.Workload.Settings.loadWorkloadConfig`.

Sprint 3.15: this mounted Dhall config is the SOLE config source for the
workload binary. The `PRODBOX_*` env-var fallback ladder was deleted from
`Prodbox.Workload`, so no rollback-safety env vars are set on the Pod;
`--config` is the only source. The ConfigMap is mounted as a directory (no
`subPath`) so a `log_level` edit reloads in-process via fsnotify, while a
`mode` / `port` edit drains-and-exits for a kubelet restart (Boot/Live split,
config_doctrine §8).
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  labels:
    {{- include "api.labels" . | nindent 4 }}
data:
  config.dhall: |-
    { schemaVersion = 1
    , mode = < Api | Websocket >.Api
    , log_level = None Text
    , workload_port = Some {{ .Values.api.port }}
    , vault =
        None
          { address : Text
          , auth_path : Text
          , role : Text
          , service_account_token_file : Optional Text
          }
    , redis =
        None { host : Text, port : Text }
    , oidc =
        None
          { issuer : Text
          , client_id : Text
          , client_secret :
              < Vault : { mount : Text, path : Text, field : Text }
              | TransitKey : Text
              | Prompt : { name : Text, purpose : Text }
              | TestPlaintext : Text
              >
          , public_base_url : Text
          , token_endpoint : Text
          }
    }
