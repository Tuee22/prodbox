apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pulsar-isolation
  labels:
    {{- include "pulsar.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pulsar.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.pulsar.brokerPort }}
        - protocol: TCP
          port: {{ .Values.pulsar.httpPort }}
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
