{{- /*
ServiceAccount the Lifecycle Authority Pod runs as. It is the Kubernetes-auth
identity for the least-privilege Vault role (`VaultRoleLifecycleAuthority`),
distinct from every other control-plane role. The name is `.Values`-driven from
the compiled Prodbox.Lifecycle.Authority.ChartStatics so it can never drift from
the compiled identity.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "lifecycle-authority.labels" . | nindent 4 }}
