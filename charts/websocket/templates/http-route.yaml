{{/* prodbox:route-registry:start */}}
{{/* Canonical public-edge route inventory generated from `src/Prodbox/PublicEdge.hs`. */}}
{{/* PUBLIC_FQDN=test.resolvefintech.com */}}
{{/* ROUTE auth=/auth */}}
{{/* ROUTE vscode=/vscode */}}
{{/* ROUTE api=/api */}}
{{/* ROUTE websocket=/ws */}}
{{/* ROUTE minio=/minio */}}
{{/* ADMIN_ROUTE minio=/minio */}}
{{/* prodbox:route-registry:end */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: websocket
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.listenerName | quote }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.websocket.path | quote }}
      backendRefs:
        - name: websocket
          port: {{ .Values.websocket.port }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: websocket-oidc
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.listenerName | quote }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.oidcPathPrefix | quote }}
      backendRefs:
        - name: websocket
          port: {{ .Values.websocket.port }}
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ .Values.jwt.jwksBackend.referenceGrantName | quote }}
  namespace: {{ .Values.jwt.jwksBackend.namespace | quote }}
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  from:
    - group: gateway.envoyproxy.io
      kind: SecurityPolicy
      namespace: {{ .Release.Namespace | quote }}
  to:
    - group: ""
      kind: Service
      name: {{ .Values.jwt.jwksBackend.serviceName | quote }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.jwt.securityPolicyName | quote }}
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: websocket
  jwt:
    providers:
      - name: {{ .Values.jwt.providerName | quote }}
        issuer: {{ .Values.jwt.issuer | quote }}
        audiences:
          - {{ .Values.jwt.audience | quote }}
        remoteJWKS:
          uri: {{ .Values.jwt.jwksUri | quote }}
          backendRefs:
            - name: {{ .Values.jwt.jwksBackend.serviceName | quote }}
              namespace: {{ .Values.jwt.jwksBackend.namespace | quote }}
              port: {{ .Values.jwt.jwksBackend.servicePort }}
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-websocket
        action: Allow
        principal:
          jwt:
            provider: {{ .Values.jwt.providerName | quote }}
            claims:
              - name: {{ .Values.jwt.routeClaimName | quote }}
                values:
                  - {{ .Values.jwt.routeClaimValue | quote }}
