global:
  namespace: default
  rootChart: keycloak

replicaCount: 1

podAntiAffinity:
  enabled: true

image:
  repository: 127.0.0.1:30080/prodbox/keycloak-mirror
  tag: "26.0.0"

gateway:
  className: prodbox-public-edge
  name: public-edge
  listenerName: https
  routeName: keycloak
  tlsSecretName: public-edge-tls
  clusterIssuer: letsencrypt-http01
  host: test.resolvefintech.com
  authPathPrefix: /auth
  vscodePathPrefix: /vscode
  apiPathPrefix: /api
  websocketPathPrefix: /ws

keycloak:
  adminUser: admin
  adminPassword: change-me
  publicHost: test.resolvefintech.com
  httpRelativePath: /auth
  realmName: prodbox

oidc:
  vscodeClientId: vscode
  vscodeClientSecret: change-me
  redirectUri: https://test.resolvefintech.com/vscode/oauth2/callback
  adminRedirectUris:
    - https://test.resolvefintech.com/harbor/oauth2/callback
    - https://test.resolvefintech.com/minio/oauth2/callback
  apiClientId: prodbox-api
  apiClientSecret: change-me
  apiAudience: prodbox-api
  apiRouteClaimName: prodbox_route
  apiRouteClaimValue: api
  websocketClientId: prodbox-websocket
  websocketClientSecret: change-me
  websocketAudience: prodbox-websocket
  websocketRouteClaimName: prodbox_route
  websocketRouteClaimValue: websocket
  websocketRedirectUri: https://test.resolvefintech.com/ws/oidc/callback
  demoUserName: demo-user
  demoUserPassword: change-me

postgres:
  host: prodbox-keycloak-pg-ha.default.svc.cluster.local
  database: keycloak
  username: keycloak
  passwordSecretName: prodbox-keycloak-pg-pguser-keycloak
