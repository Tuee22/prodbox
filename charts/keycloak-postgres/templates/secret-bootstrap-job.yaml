{{- /*
Sprint 3.18: Helm pre-install hook that materializes the three
Percona-watched Patroni-role Secrets from Vault KV before the
PerconaPGCluster resource is created. The PerconaPGCluster v2.9.0 CRD does
not expose a generated-Pod serviceAccountName field, so direct Vault auth
belongs to this least-privilege materializer Job rather than to the
operator-created PostgreSQL Pods.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: patroni-secret-materializer-{{ .Release.Name }}
  labels:
    {{- include "keycloak-postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Sprint 3.13 chunk 26: per-Job-pod retry window must stay well under
  # helm's `--timeout 30m0s` so helm sees the Job complete (or fail) in
  # time. Chunk 25's aggressive budget (30 retries × 5s × 60s max-time)
  # let a single pod run for ~32 min, exceeding helm's hook wait. The
  # tuned budget below (12 retries × 5s × 30s max-time = ~90s per pod)
  # × backoffLimit 6 = ~9 min total wall-clock — generous enough to
  # cover the Service-endpoint-propagation race on fresh-cluster
  # bootstrap (proven in live testing to take seconds, not minutes), but
  # tight enough that helm sees the Job's terminal state before its own
  # timeout.
  backoffLimit: 6
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "keycloak-postgres.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.secretMaterializer.serviceAccountName | quote }}
      restartPolicy: OnFailure
      initContainers:
        - name: vault-secrets
          image: "{{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}"
          imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_AUTH_PATH
              value: {{ .Values.vault.authPath | quote }}
            - name: VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: VAULT_SA_TOKEN_FILE
              value: {{ .Values.vault.serviceAccountTokenFile | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              jwt="$(cat "${VAULT_SA_TOKEN_FILE}")"
              export VAULT_TOKEN="$(vault write -field=token "auth/${VAULT_AUTH_PATH}/login" role="${VAULT_ROLE}" jwt="${jwt}")"
              umask 077
              materialize_pair() {
                prefix="$1"
                path="$2"
                vault kv get -field=username "secret/${path}" > "/vault-materialized/${prefix}-username"
                vault kv get -field=password "secret/${path}" > "/vault-materialized/${prefix}-password"
              }
              materialize_pair app {{ .Values.vault.paths.application | quote }}
              materialize_pair superuser {{ .Values.vault.paths.superuser | quote }}
              materialize_pair standby {{ .Values.vault.paths.standby | quote }}
          volumeMounts:
            - name: vault-materialized
              mountPath: /vault-materialized
      containers:
        - name: materialize-patroni-secrets
          image: "{{ .Values.secretMaterializer.image.repository }}:{{ .Values.secretMaterializer.image.tag }}"
          imagePullPolicy: {{ .Values.secretMaterializer.image.pullPolicy }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICEACCOUNT_TOKEN_FILE
              value: /var/run/secrets/kubernetes.io/serviceaccount/token
            - name: SERVICEACCOUNT_CA_FILE
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          command:
            - sh
            - -c
            - |
              set -eu

              api_server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
              token="$(cat "${SERVICEACCOUNT_TOKEN_FILE}")"

              materialize_secret() {
                secret_name="$1"
                username_file="$2"
                password_file="$3"
                username_b64="$(base64 < "${username_file}" | tr -d '\n')"
                password_b64="$(base64 < "${password_file}" | tr -d '\n')"

                cat > /tmp/secret-create.json <<EOF
              {"apiVersion":"v1","kind":"Secret","metadata":{"name":"${secret_name}","labels":{"app.kubernetes.io/name":"keycloak-postgres","app.kubernetes.io/instance":"{{ .Release.Name }}","app.kubernetes.io/managed-by":"prodbox","prodbox.io/chart-root":"{{ .Values.global.rootChart }}"}},"type":"Opaque","data":{"username":"${username_b64}","password":"${password_b64}"}}
              EOF
                cat > /tmp/secret-patch.json <<EOF
              {"metadata":{"labels":{"app.kubernetes.io/name":"keycloak-postgres","app.kubernetes.io/instance":"{{ .Release.Name }}","app.kubernetes.io/managed-by":"prodbox","prodbox.io/chart-root":"{{ .Values.global.rootChart }}"}},"type":"Opaque","data":{"username":"${username_b64}","password":"${password_b64}"}}
              EOF

                create_code="$(
                  curl -sS \
                    --cacert "${SERVICEACCOUNT_CA_FILE}" \
                    -H "Authorization: Bearer ${token}" \
                    -H "Content-Type: application/json" \
                    -o /tmp/secret-create-response.json \
                    -w '%{http_code}' \
                    --data-binary @/tmp/secret-create.json \
                    "${api_server}/api/v1/namespaces/${POD_NAMESPACE}/secrets" \
                    || true
                )"

                case "${create_code}" in
                  201)
                    return 0
                    ;;
                  409)
                    patch_code="$(
                      curl -sS \
                        --cacert "${SERVICEACCOUNT_CA_FILE}" \
                        -H "Authorization: Bearer ${token}" \
                        -H "Content-Type: application/merge-patch+json" \
                        -o /tmp/secret-patch-response.json \
                        -w '%{http_code}' \
                        --request PATCH \
                        --data-binary @/tmp/secret-patch.json \
                        "${api_server}/api/v1/namespaces/${POD_NAMESPACE}/secrets/${secret_name}" \
                        || true
                    )"
                    case "${patch_code}" in
                      200|201)
                        return 0
                        ;;
                      *)
                        cat /tmp/secret-patch-response.json >&2
                        return 1
                        ;;
                    esac
                    ;;
                  *)
                    cat /tmp/secret-create-response.json >&2
                    return 1
                    ;;
                esac
              }

              materialize_secret {{ .Values.secrets.application.name | quote }} /vault-materialized/app-username /vault-materialized/app-password
              materialize_secret {{ .Values.secrets.superuser.name | quote }} /vault-materialized/superuser-username /vault-materialized/superuser-password
              materialize_secret {{ .Values.secrets.standby.name | quote }} /vault-materialized/standby-username /vault-materialized/standby-password
          volumeMounts:
            - name: vault-materialized
              mountPath: /vault-materialized
              readOnly: true
      volumes:
        - name: vault-materialized
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
