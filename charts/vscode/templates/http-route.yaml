apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-client" .Values.oidc.securityPolicyName | quote }}
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
type: Opaque
stringData:
  client-secret: {{ .Values.oidc.clientSecret | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vscode
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      sectionName: {{ .Values.gateway.listenerName | quote }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.pathPrefix | quote }}
      backendRefs:
        - name: vscode
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.oidc.securityPolicyName | quote }}
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vscode
  oidc:
    provider:
      issuer: {{ .Values.oidc.issuer | quote }}
    clientID: {{ .Values.oidc.clientId | quote }}
    clientSecret:
      name: {{ printf "%s-client" .Values.oidc.securityPolicyName | quote }}
    redirectURL: {{ .Values.oidc.redirectURL | quote }}
    logoutPath: {{ .Values.oidc.logoutPath | quote }}
