{{- /*
ServiceAccount the TLS Retention Adapter Pod runs as. It is the Kubernetes-auth
identity for the least-privilege Vault role (`VaultRoleTlsRetention`), which is
distinct from the Gateway Runtime's `prodbox-gateway-daemon` role and reads only
`secret/aws/tls-retention-store`. The name is `.Values`-driven from the compiled
Prodbox.Lifecycle.TlsRetention.ChartStatics so it can never drift from the
compiled identity.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "tls-retention.labels" . | nindent 4 }}
