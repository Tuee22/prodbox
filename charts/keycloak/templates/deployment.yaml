apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  progressDeadlineSeconds: 1800
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: keycloak
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "keycloak.labels" . | nindent 8 }}
    spec:
      serviceAccountName: keycloak
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: keycloak
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      initContainers:
        - name: vault-secrets
          image: "{{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}"
          imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_AUTH_PATH
              value: {{ .Values.vault.authPath | quote }}
            - name: VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: VAULT_SA_TOKEN_FILE
              value: {{ .Values.vault.serviceAccountTokenFile | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              set -eu

              shell_quote() {
                printf "'"
                printf "%s" "$1" | sed "s/'/'\\\\''/g"
                printf "'"
              }

              write_export() {
                printf 'export %s=' "$1"
                shell_quote "$2"
                printf '\n'
              }

              jwt="$(cat "${VAULT_SA_TOKEN_FILE}")"
              export VAULT_TOKEN="$(vault write -field=token "auth/${VAULT_AUTH_PATH}/login" role="${VAULT_ROLE}" jwt="${jwt}")"
              umask 077
              {
                write_export KEYCLOAK_ADMIN_PASSWORD "$(vault kv get -field=password secret/{{ .Values.vault.paths.admin }})"
                write_export KC_DB_PASSWORD "$(vault kv get -field=password secret/{{ .Values.vault.paths.db }})"
                write_export PRODBOX_VSCODE_CLIENT_SECRET "$(vault kv get -field=client_secret secret/{{ .Values.vault.paths.oidcVscode }})"
                write_export PRODBOX_API_CLIENT_SECRET "$(vault kv get -field=client_secret secret/{{ .Values.vault.paths.oidcApi }})"
                write_export PRODBOX_WEBSOCKET_CLIENT_SECRET "$(vault kv get -field=client_secret secret/{{ .Values.vault.paths.oidcWebsocket }})"
                write_export PRODBOX_DEMO_USER_PASSWORD "$(vault kv get -field=password secret/{{ .Values.vault.paths.demoUser }})"
                {{- if .Values.smtp.enabled }}
                write_export PRODBOX_SMTP_HOST "$(vault kv get -field=host secret/{{ .Values.vault.paths.smtp }})"
                write_export PRODBOX_SMTP_PORT "$(vault kv get -field=port secret/{{ .Values.vault.paths.smtp }})"
                write_export PRODBOX_SMTP_FROM "$(vault kv get -field=from secret/{{ .Values.vault.paths.smtp }})"
                write_export PRODBOX_SMTP_FROM_DISPLAY_NAME "$(vault kv get -field=from_display_name secret/{{ .Values.vault.paths.smtp }})"
                write_export PRODBOX_SMTP_REPLY_TO "$(vault kv get -field=reply_to secret/{{ .Values.vault.paths.smtp }})"
                write_export PRODBOX_SMTP_USER "$(vault kv get -field=username secret/{{ .Values.vault.paths.smtp }})"
                write_export PRODBOX_SMTP_PASSWORD "$(vault kv get -field=password secret/{{ .Values.vault.paths.smtp }})"
                {{- end }}
              } > /vault-materialized/keycloak.env
              # The init container writes under `umask 077` (0600, owner-only),
              # but the keycloak container runs as a DIFFERENT UID and sources
              # this file at startup — without this it dies with
              # `/vault-materialized/keycloak.env: Permission denied` and
              # CrashLoopBackOffs. Make it world-readable within the pod, the
              # same cross-container materializer handoff fix as the ACME EAB
              # hmac-key (`chmod 0644 /vault-materialized/hmac-key`).
              chmod 0644 /vault-materialized/keycloak.env
          volumeMounts:
            - name: vault-materialized
              mountPath: /vault-materialized
      {{- $healthPathPrefix := trimSuffix "/" .Values.keycloak.httpRelativePath }}
      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              . /vault-materialized/keycloak.env
              exec /opt/keycloak/bin/kc.sh \
                start \
                --http-enabled=true \
                --health-enabled=true \
                --proxy-headers=xforwarded \
                --hostname={{ .Values.keycloak.publicHost }} \
                --http-relative-path={{ .Values.keycloak.httpRelativePath }} \
                --import-realm
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: KC_DB_URL_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: KC_DB_USERNAME
              value: {{ .Values.postgres.username | quote }}
            - name: KEYCLOAK_ADMIN
              value: {{ .Values.keycloak.adminUser | quote }}
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
            - name: vault-materialized
              mountPath: /vault-materialized
              readOnly: true
          startupProbe:
            httpGet:
              path: {{ printf "%s/health/ready" $healthPathPrefix | quote }}
              port: 9000
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ printf "%s/health/ready" $healthPathPrefix | quote }}
              port: 9000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: {{ printf "%s/health/live" $healthPathPrefix | quote }}
              port: 9000
            initialDelaySeconds: 40
            periodSeconds: 20
      volumes:
        - name: realm-import
          configMap:
            name: keycloak-realm-import
        - name: vault-materialized
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
