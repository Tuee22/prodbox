{{- /*
Sprint 3.13 chunk 11: OAuth client secrets + demo-user password are owned
by the gateway daemon (via the `keycloak-oidc-clients` Secret it materializes
through the chart's pre-install Job). The chart reads them via Helm `lookup`
at template-render time and substitutes into the realm-import JSON below.

On first install before the pre-install Job runs, the lookup returns empty
and the chart falls back to the `.Values.oidc.*` placeholder values. Once
the Job lands and writes the Secret, subsequent helm upgrades pick up the
master-seed-derived values and the realm-import has the correct client
secrets. The realm-import only runs on first Keycloak Pod start; operators
must restart the Keycloak Pod after the first run-with-daemon-Secret so
the realm reflects the derived values.
*/}}
{{- $oidcSecret := lookup "v1" "Secret" .Release.Namespace "keycloak-oidc-clients" }}
{{- $vscodeClientSecret := .Values.oidc.vscodeClientSecret }}
{{- $apiClientSecret := .Values.oidc.apiClientSecret }}
{{- $websocketClientSecret := .Values.oidc.websocketClientSecret }}
{{- $demoUserPassword := .Values.oidc.demoUserPassword }}
{{- if $oidcSecret }}
{{- $vscodeClientSecret = index $oidcSecret.data "VSCODE_CLIENT_SECRET" | b64dec }}
{{- $apiClientSecret = index $oidcSecret.data "API_CLIENT_SECRET" | b64dec }}
{{- $websocketClientSecret = index $oidcSecret.data "WEBSOCKET_CLIENT_SECRET" | b64dec }}
{{- $demoUserPassword = index $oidcSecret.data "DEMO_USER_PASSWORD" | b64dec }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  realm.json: |
    {
      "realm": {{ .Values.keycloak.realmName | quote }},
      "enabled": true,
      "displayName": "prodbox",
      "sslRequired": "none",
      "registrationAllowed": false,
      "verifyEmail": {{ .Values.keycloak.requireEmailVerification }},
      "loginWithEmailAllowed": true,
      {{- /*
        Sprint 3.13 chunk 10: SMTP credentials are owned by `prodbox pulumi
        aws-ses-resources`, which kubectl-applies the `keycloak-smtp` Secret
        with the seven `KC_SMTP_*` fields after deriving the SES SMTP
        password. The chart reads them via Helm `lookup` at template-render
        time. On first install before SES is provisioned the lookup returns
        empty and the realm-import omits `smtpServer`; Keycloak comes up
        without SMTP and operator-invite emails are deferred until
        `prodbox charts deploy keycloak` re-runs after SES provisioning.
      */ -}}
      {{- $smtpSecret := lookup "v1" "Secret" .Release.Namespace "keycloak-smtp" }}
      {{- if $smtpSecret }}
      "smtpServer": {
        "host": {{ index $smtpSecret.data "KC_SMTP_HOST" | b64dec | quote }},
        "port": {{ index $smtpSecret.data "KC_SMTP_PORT" | b64dec | quote }},
        "from": {{ index $smtpSecret.data "KC_SMTP_FROM" | b64dec | quote }},
        "fromDisplayName": {{ index $smtpSecret.data "KC_SMTP_FROM_DISPLAY_NAME" | b64dec | quote }},
        "replyTo": {{ index $smtpSecret.data "KC_SMTP_REPLY_TO" | b64dec | quote }},
        "starttls": "true",
        "auth": "true",
        "user": {{ index $smtpSecret.data "KC_SMTP_USER" | b64dec | quote }},
        "password": {{ index $smtpSecret.data "KC_SMTP_PASSWORD" | b64dec | quote }}
      },
      {{- end }}
      "clients": [
        {
          "clientId": {{ .Values.oidc.vscodeClientId | quote }},
          "secret": {{ $vscodeClientSecret | quote }},
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            {{ .Values.oidc.redirectUri | quote }}{{- range .Values.oidc.adminRedirectUris }},
            {{ . | quote }}{{- end }}
          ],
          "webOrigins": [
            {{ printf "https://%s" .Values.gateway.host | quote }}
          ]
        },
        {
          "clientId": {{ .Values.oidc.apiClientId | quote }},
          "secret": {{ $apiClientSecret | quote }},
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "protocolMappers": [
            {
              "name": "api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": {{ .Values.oidc.apiAudience | quote }},
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            },
            {
              "name": "api-route-claim",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": {{ .Values.oidc.apiRouteClaimName | quote }},
                "claim.value": {{ .Values.oidc.apiRouteClaimValue | quote }},
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "false",
                "userinfo.token.claim": "false"
              }
            }
          ]
        },
        {
          "clientId": {{ .Values.oidc.websocketClientId | quote }},
          "secret": {{ $websocketClientSecret | quote }},
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            {{ .Values.oidc.websocketRedirectUri | quote }}
          ],
          "webOrigins": [
            {{ printf "https://%s" .Values.gateway.host | quote }}
          ],
          "protocolMappers": [
            {
              "name": "websocket-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": {{ .Values.oidc.websocketAudience | quote }},
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            },
            {
              "name": "websocket-route-claim",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": {{ .Values.oidc.websocketRouteClaimName | quote }},
                "claim.value": {{ .Values.oidc.websocketRouteClaimValue | quote }},
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "false",
                "userinfo.token.claim": "false"
              }
            }
          ]
        }
      ],
      "users": [
        {
          "username": {{ .Values.oidc.demoUserName | quote }},
          "enabled": true,
          "firstName": "Demo",
          "lastName": "User",
          "email": "demo-user@prodbox.invalid",
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            {
              "type": "password",
              "value": {{ $demoUserPassword | quote }},
              "temporary": false
            }
          ]
        }
      ]
    }
