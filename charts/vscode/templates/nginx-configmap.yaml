apiVersion: v1
kind: ConfigMap
metadata:
  name: vscode-nginx-config
  labels:
    {{- include "vscode.nginxLabels" . | nindent 4 }}
data:
  nginx.conf: |
    load_module modules/ngx_http_js_module.so;

    env KEYCLOAK_INTERNAL_URL;
    env KEYCLOAK_BROWSER_URL;
    env KEYCLOAK_REALM;
    env OIDC_CLIENT_ID;
    env OIDC_CLIENT_SECRET;
    env OIDC_REDIRECT_URI;

    events {
        worker_connections 1024;
    }

    http {
        js_path /etc/nginx/njs/;
        js_import oidc from oidc.js;

        # Computed once per request by njs; used by the @oidc_login named location.
        js_set $oidc_login_url oidc.loginUrl;

        # CoreDNS ClusterIP — required for ngx.fetch hostname resolution in njs.
        resolver {{ .Values.nginx.dnsResolver }} valid=30s;

        upstream code_server {
            server vscode:8080;
        }

        upstream keycloak_backend {
            server keycloak:8080;
        }

        server {
            listen 80;
            server_name _;

            location = /auth/callback {
                js_content oidc.handleCallback;
            }

            location /auth/ {
                proxy_pass         http://keycloak_backend/auth/;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_set_header   X-Forwarded-Proto $scheme;
                proxy_buffer_size  128k;
                proxy_buffers      4 256k;
            }

            location = /_auth_check {
                internal;
                js_content oidc.checkAuth;
            }

            location @oidc_login {
                return 302 $oidc_login_url;
            }

            location / {
                auth_request  /_auth_check;
                error_page 401 = @oidc_login;

                proxy_pass         http://code_server;
                proxy_set_header   Host              $host;
                proxy_set_header   X-Real-IP         $remote_addr;
                proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
                proxy_http_version 1.1;
                proxy_set_header   Upgrade    $http_upgrade;
                proxy_set_header   Connection "upgrade";
                proxy_read_timeout 86400s;
            }
        }
    }

  oidc.js: |
    function cfg() {
        var internal = process.env.KEYCLOAK_INTERNAL_URL;
        var browser  = process.env.KEYCLOAK_BROWSER_URL;
        var realm    = process.env.KEYCLOAK_REALM;
        var base     = '/auth/realms/' + realm + '/protocol/openid-connect';
        var browserHost = browser.replace(/^https?:\/\//, '').replace(/\/$/, '');
        return {
            clientId:         process.env.OIDC_CLIENT_ID,
            clientSecret:     process.env.OIDC_CLIENT_SECRET,
            redirectUri:      process.env.OIDC_REDIRECT_URI,
            authEndpoint:     browser + base + '/auth',
            tokenEndpoint:    internal + base + '/token',
            userinfoEndpoint: internal + base + '/userinfo',
            browserHost:      browserHost,
        };
    }

    function getCookie(r, name) {
        var header = r.headersIn['Cookie'] || '';
        var parts = header.split(';');
        for (var i = 0; i < parts.length; i++) {
            var eq = parts[i].indexOf('=');
            if (eq < 0) continue;
            if (parts[i].slice(0, eq).trim() === name) {
                return parts[i].slice(eq + 1).trim();
            }
        }
        return null;
    }

    function formEncode(obj) {
        var entries = Object.entries(obj);
        var pairs = [];
        for (var i = 0; i < entries.length; i++) {
            pairs.push(encodeURIComponent(entries[i][0]) + '=' + encodeURIComponent(entries[i][1]));
        }
        return pairs.join('&');
    }

    async function checkAuth(r) {
        var token = getCookie(r, 'vscode_session');
        if (!token) {
            r.return(401);
            return;
        }
        try {
            var c = cfg();
            var resp = await ngx.fetch(c.userinfoEndpoint, {
                headers: {
                    Authorization: 'Bearer ' + token,
                    Host:          c.browserHost,
                },
            });
            r.return(resp.status === 200 ? 204 : 401);
        } catch (_) {
            r.return(401);
        }
    }

    async function handleCallback(r) {
        var code = r.args.code;
        if (!code) {
            r.return(400, 'Missing authorization code\n');
            return;
        }
        var c = cfg();
        try {
            var resp = await ngx.fetch(c.tokenEndpoint, {
                method:  'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body:    formEncode({
                    grant_type:    'authorization_code',
                    code:           code,
                    redirect_uri:   c.redirectUri,
                    client_id:      c.clientId,
                    client_secret:  c.clientSecret,
                }),
            });
            if (resp.status !== 200) {
                r.return(502, 'Token exchange failed\n');
                return;
            }
            var data = await resp.json();
            r.headersOut['Set-Cookie'] =
                'vscode_session=' + data.access_token + '; Path=/; HttpOnly; SameSite=Lax';
            r.return(302, '/');
        } catch (e) {
            r.return(502, 'Token exchange error: ' + e.message + '\n');
        }
    }

    function loginUrl(r) {
        var c = cfg();
        var params = formEncode({
            response_type: 'code',
            client_id:     c.clientId,
            redirect_uri:  c.redirectUri,
            scope:         'openid profile email',
        });
        return c.authEndpoint + '?' + params;
    }

    export default { checkAuth, handleCallback, loginUrl };
