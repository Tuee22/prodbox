apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "websocket.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: websocket
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: websocket
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          args: ["workload", "start", "--config", "/etc/workload/config.dhall"]
          volumeMounts:
            - name: workload-config
              # Sprint 3.15: directory-style mount (no subPath) so the
              # kubelet's atomic `..data` symlink swap on ConfigMap update
              # fires fsnotify on /etc/workload/. With a subPath mount the
              # kubelet does NOT propagate ConfigMap updates to the bound
              # file, which silently breaks the workload's file-watch reload
              # loop (the Sprint 2.21 chunk-47 gotcha).
              mountPath: /etc/workload
              readOnly: true
          ports:
            - name: http
              containerPort: {{ .Values.websocket.port }}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: workload-config
          configMap:
            name: websocket-config
