global:
  namespace: default
  rootChart: keycloak

replicaCount: 2

podAntiAffinity:
  enabled: true

image:
  repository: 127.0.0.1:30080/prodbox/keycloak-mirror
  tag: "26.0.0"

keycloak:
  adminUser: admin
  adminPassword: change-me
  publicHost: vscode.example.com
  relativePath: /auth
  realmName: prodbox

postgres:
  host: prodbox-keycloak-postgres.default.svc.cluster.local
  database: keycloak
  username: keycloak
  passwordSecretName: keycloak.prodbox-keycloak-postgres.credentials.postgresql.acid.zalan.do

nginx:
  clientId: vscode-nginx
  clientSecret: change-me
