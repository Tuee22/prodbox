<!--
  Sprint 8.5/8.8 LIVE capture (2026-06-08) of the Keycloak 26 invite
  credential-setup flow against the running `prodbox` realm on
  test.resolvefintech.com. This replaces the earlier synthetic fixture
  per DEVELOPMENT_PLAN/phase-8-email-invite-auth.md Sprint 8.5 Step 6.

  The invite action-token link lands on PAGE 1 (the bundled
  "Perform the following action(s)" confirmation page); its "Click here
  to proceed" anchor is a /login-actions/action-token continuation URL
  (NOT /login-actions/required-action). Following that anchor yields
  PAGE 2, the actual <form id="kc-passwd-update-form"> whose password
  inputs are named `password-new` and `password-confirm` and which
  carries no hidden inputs (session state lives in the action query
  string). Token/session values below are shortened placeholders (the
  live tokens are single-use and were consumed at capture time).

  Reference only; the parser unit tests in test/unit/Main.hs pin the
  shape with equivalent inline HTML.
-->

<!-- ===== PAGE 1: bundled required-actions confirmation (proceed page) ===== -->
<!DOCTYPE html>
<html>
  <head><title>Sign in to prodbox</title></head>
  <body>
    <div id="kc-content">
      <div id="kc-content-wrapper">
        <div id="kc-info-message">
          <p class="instruction">Perform the following action(s): Verify Email, Update Password</p>
          <p>
            <a href="https://test.resolvefintech.com/auth/realms/prodbox/login-actions/action-token?key=ACTION_TOKEN_JWT&amp;client_id=account&amp;tab_id=TID&amp;client_data=CDATA">&raquo; Click here to proceed</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>

<!-- ===== PAGE 2: update-password form (after following the proceed anchor) ===== -->
<!DOCTYPE html>
<html>
  <head><title>Sign in to prodbox</title></head>
  <body>
    <div id="kc-content">
      <form id="kc-passwd-update-form" class="pf-v5-c-form"
            action="https://test.resolvefintech.com/auth/realms/prodbox/login-actions/required-action?session_code=SESSION_CODE&amp;execution=UPDATE_PASSWORD&amp;client_id=account&amp;tab_id=TID&amp;client_data=CDATA"
            method="post" novalidate="novalidate">
        <div class="pf-v5-c-form__group">
          <label for="password-new">New Password</label>
          <div class="pf-v5-c-input-group">
            <span class="pf-v5-c-form-control ">
              <input id="password-new" name="password-new" value="" type="password" autocomplete="new-password" autofocus aria-invalid=""/>
            </span>
          </div>
        </div>
        <div class="pf-v5-c-form__group">
          <label for="password-confirm">Confirm password</label>
          <div class="pf-v5-c-input-group">
            <span class="pf-v5-c-form-control ">
              <input id="password-confirm" name="password-confirm" value="" type="password" autocomplete="new-password" aria-invalid=""/>
            </span>
          </div>
        </div>
        <input class="pf-v5-c-check__input" type="checkbox" id="logout-sessions" name="logout-sessions" value="on" checked>
        <button class="pf-v5-c-button pf-m-primary" type="submit">Submit</button>
      </form>
    </div>
  </body>
</html>
