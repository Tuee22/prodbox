apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.gateway.tlsSecretName | quote }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  secretName: {{ .Values.gateway.tlsSecretName | quote }}
  issuerRef:
    kind: ClusterIssuer
    name: {{ .Values.gateway.clusterIssuer | quote }}
  dnsNames:
    - {{ .Values.gateway.host | quote }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name | quote }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.className | quote }}
  listeners:
    - name: {{ .Values.gateway.listenerName | quote }}
      hostname: {{ .Values.gateway.host | quote }}
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tlsSecretName | quote }}
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.gateway.routeName | quote }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      sectionName: {{ .Values.gateway.listenerName | quote }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ printf "%s/realms" .Values.gateway.authPathPrefix | quote }}
        - path:
            type: PathPrefix
            value: {{ printf "%s/resources" .Values.gateway.authPathPrefix | quote }}
      backendRefs:
        - name: keycloak
          port: 8080
