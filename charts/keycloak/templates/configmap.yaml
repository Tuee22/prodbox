{{- /*
Sprint 3.18: Keycloak realm-import secrets are environment placeholders.
The Pod's Vault init container materializes those environment variables from
Vault KV before Keycloak starts; a sealed/unreachable Vault or missing field
therefore fails startup closed instead of falling back to Helm `lookup` or
values.yaml plaintext.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
data:
  realm.json: |
    {
      "realm": {{ .Values.keycloak.realmName | quote }},
      "enabled": true,
      "displayName": "prodbox",
      "sslRequired": "none",
      "registrationAllowed": false,
      "verifyEmail": {{ .Values.keycloak.requireEmailVerification }},
      "loginWithEmailAllowed": true,
      {{- if .Values.smtp.enabled }}
      "smtpServer": {
        "host": "${PRODBOX_SMTP_HOST}",
        "port": "${PRODBOX_SMTP_PORT}",
        "from": "${PRODBOX_SMTP_FROM}",
        "fromDisplayName": "${PRODBOX_SMTP_FROM_DISPLAY_NAME}",
        "replyTo": "${PRODBOX_SMTP_REPLY_TO}",
        "starttls": "true",
        "auth": "true",
        "user": "${PRODBOX_SMTP_USER}",
        "password": "${PRODBOX_SMTP_PASSWORD}"
      },
      {{- end }}
      "clients": [
        {
          "clientId": {{ .Values.oidc.vscodeClientId | quote }},
          "secret": "${PRODBOX_VSCODE_CLIENT_SECRET}",
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": false,
          "redirectUris": [
            {{ .Values.oidc.redirectUri | quote }}{{- range .Values.oidc.adminRedirectUris }},
            {{ . | quote }}{{- end }}
          ],
          "webOrigins": [
            {{ printf "https://%s" .Values.gateway.host | quote }}
          ]
        },
        {
          "clientId": {{ .Values.oidc.apiClientId | quote }},
          "secret": "${PRODBOX_API_CLIENT_SECRET}",
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": false,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "protocolMappers": [
            {
              "name": "api-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": {{ .Values.oidc.apiAudience | quote }},
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            },
            {
              "name": "api-route-claim",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": {{ .Values.oidc.apiRouteClaimName | quote }},
                "claim.value": {{ .Values.oidc.apiRouteClaimValue | quote }},
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "false",
                "userinfo.token.claim": "false"
              }
            }
          ]
        },
        {
          "clientId": {{ .Values.oidc.websocketClientId | quote }},
          "secret": "${PRODBOX_WEBSOCKET_CLIENT_SECRET}",
          "enabled": true,
          "publicClient": false,
          "protocol": "openid-connect",
          "standardFlowEnabled": true,
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": false,
          "redirectUris": [
            {{ .Values.oidc.websocketRedirectUri | quote }}
          ],
          "webOrigins": [
            {{ printf "https://%s" .Values.gateway.host | quote }}
          ],
          "protocolMappers": [
            {
              "name": "websocket-audience",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": {{ .Values.oidc.websocketAudience | quote }},
                "access.token.claim": "true",
                "id.token.claim": "false"
              }
            },
            {
              "name": "websocket-route-claim",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-hardcoded-claim-mapper",
              "config": {
                "claim.name": {{ .Values.oidc.websocketRouteClaimName | quote }},
                "claim.value": {{ .Values.oidc.websocketRouteClaimValue | quote }},
                "jsonType.label": "String",
                "access.token.claim": "true",
                "id.token.claim": "false",
                "userinfo.token.claim": "false"
              }
            }
          ]
        }
      ],
      "users": [
        {
          "username": {{ .Values.oidc.demoUserName | quote }},
          "enabled": true,
          "firstName": "Demo",
          "lastName": "User",
          "email": "demo-user@prodbox.invalid",
          "emailVerified": true,
          "requiredActions": [],
          "credentials": [
            {
              "type": "password",
              "value": "${PRODBOX_DEMO_USER_PASSWORD}",
              "temporary": false
            }
          ]
        }
      ]
    }
