{{- /*
In-cluster ClusterIP Service for the Provider Worker. It fronts the worker's
constant-time `/healthz`/`/readyz` route surface for in-cluster reachability and
stable DNS.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: provider-worker
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "provider-worker.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "provider-worker.selectorLabels" . | nindent 4 }}
  ports:
    - name: provider
      port: {{ .Values.listener.port }}
      targetPort: provider
      protocol: TCP
