apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vscode
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "vscode.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: vscode
          image: {{ .Values.vscode.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --auth
            - none
            - --bind-addr
            - 0.0.0.0:8080
            - /workspace
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.vscode.existingClaim | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode-nginx
  labels:
    {{- include "vscode.nginxLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vscode-nginx
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "vscode.nginxLabels" . | nindent 8 }}
    spec:
      containers:
        - name: nginx
          image: {{ .Values.nginx.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          env:
            - name: KEYCLOAK_INTERNAL_URL
              value: {{ .Values.nginx.keycloakInternalUrl | quote }}
            - name: KEYCLOAK_BROWSER_URL
              value: {{ printf "https://%s" .Values.ingress.host | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.nginx.realm | quote }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.nginx.clientId | quote }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vscode-nginx
                  key: OIDC_CLIENT_SECRET
            - name: OIDC_REDIRECT_URI
              value: {{ printf "https://%s/auth/callback" .Values.ingress.host | quote }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
            - name: nginx-config
              mountPath: /etc/nginx/njs/oidc.js
              subPath: oidc.js
              readOnly: true
          readinessProbe:
            httpGet:
              path: /auth/realms/{{ .Values.nginx.realm }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /auth/realms/{{ .Values.nginx.realm }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: nginx-config
          configMap:
            name: vscode-nginx-config
