global:
  namespace: default
  rootChart: keycloak

keycloak:
  adminUser: admin
  adminPassword: change-me
  publicHost: vscode.example.com
  relativePath: /auth
  realmName: prodbox

postgres:
  host: keycloak-postgres
  database: keycloak
  username: keycloak
  password: change-me

nginx:
  clientId: vscode-nginx
  clientSecret: change-me
