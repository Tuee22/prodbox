{{- /*
Isolation policy for the substrate-local Target Secret Agent. Egress is limited
to what the agent actually needs — DNS and the Vault API (Kubernetes auth plus
the allowlisted target-secret KV / Transit operations). The agent has NO
object-store, mesh, Pulumi, SES, or external egress. Ingress is restricted to
its own namespace; kubelet liveness/readiness probes are node-local and
unaffected.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: target-secret-agent-isolation
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "target-secret-agent.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prodbox-target-secret-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
      ports:
        - protocol: TCP
          port: target
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prodbox-vault
      ports:
        - protocol: TCP
          port: 8200
