{{- range $idx, $nodeId := .Values.nodes.rankedIds }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-{{ $nodeId }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    gateway-node: {{ $nodeId | quote }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gateway.selectorLabels" $ | nindent 6 }}
      gateway-node: {{ $nodeId | quote }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gateway.labels" $ | nindent 8 }}
        gateway-node: {{ $nodeId | quote }}
    spec:
      {{- if $.Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "gateway.selectorLabels" $ | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: gateway
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          args:
            - --config
            - /etc/gateway/config.dhall
          ports:
            - name: rest
              containerPort: {{ $.Values.ports.rest }}
              protocol: TCP
            - name: events
              containerPort: {{ $.Values.ports.events }}
              protocol: TCP
          # Sprint 2.22: the Pod's environment is now restricted to k8s
          # runtime metadata the daemon does not read for configuration.
          # AWS / MinIO credentials and the node identity come from the
          # daemon's mounted Dhall config (via Secret-mounted Dhall fragments
          # imported by config.dhall) per
          # documents/engineering/config_doctrine.md § 10.
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: ca
              mountPath: /ca
              readOnly: true
            - name: orders
              mountPath: /etc/gateway/orders.dhall
              subPath: orders.dhall
              readOnly: true
            - name: config
              mountPath: /etc/gateway/config.dhall
              subPath: config.dhall
              readOnly: true
            - name: aws-secrets
              mountPath: /etc/gateway/secrets/aws.dhall
              subPath: aws.dhall
              readOnly: true
            - name: minio-secrets
              mountPath: /etc/gateway/secrets/minio.dhall
              subPath: minio.dhall
              readOnly: true
          livenessProbe:
            httpGet:
              path: /v1/state
              port: rest
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/state
              port: rest
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tls
          secret:
            secretName: gateway-{{ $nodeId }}-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: ca
          secret:
            secretName: {{ $.Values.certManager.caSecretName }}
            items:
              - key: ca.crt
                path: ca.crt
        - name: orders
          configMap:
            name: gateway-orders
        - name: config
          configMap:
            name: gateway-config-{{ $nodeId }}
        - name: aws-secrets
          secret:
            secretName: gateway-aws-credentials
            items:
              - key: aws.dhall
                path: aws.dhall
        - name: minio-secrets
          secret:
            secretName: gateway-minio-creds
            items:
              - key: minio.dhall
                path: minio.dhall
{{- end }}
