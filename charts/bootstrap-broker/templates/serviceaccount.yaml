{{- /*
ServiceAccount the Bootstrap Broker Pod runs as. It is the Kubernetes-auth
identity for the bootstrap-only Vault role (`VaultRoleBootstrapBroker`), which
is distinct from the Gateway Runtime's `prodbox-gateway-daemon` role. The name
is `.Values`-driven from the compiled Prodbox.Bootstrap.Broker.ChartStatics so
it can never drift from the compiled identity.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "bootstrap-broker.labels" . | nindent 4 }}
