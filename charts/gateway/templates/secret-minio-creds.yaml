{{- /*
Sprint 2.22 (May 24, 2026): the gateway-minio-creds Secret now ships a Dhall
fragment at @/etc/gateway/secrets/minio.dhall@ instead of two env-var keys.
The daemon's config.dhall imports this file and binds the credentials into
the @boot.minio_creds@ field per
@documents/engineering/config_doctrine.md §6@.

The MinIO IAM bootstrap (Sprint 2.19 follow-up) re-grants the user
@s3:GetObject@/@s3:PutObject@/@s3:ListBucket@ on @prodbox/*@ on each cluster
rebuild. The username and password are generated once via @lookup@ +
@randAlphaNum@ and persisted across helm upgrades. The master seed itself is
**not** rotated by this rotation; see
@documents/engineering/secret_derivation_doctrine.md §6@.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "gateway-minio-creds" -}}
{{- $username := "" -}}
{{- $password := "" -}}
{{- if and $existing $existing.data -}}
  {{- if hasKey $existing.data "minio.dhall" -}}
    {{- /* Already migrated: extract username/password from the Dhall fragment via crude
           string scanning so we keep stable values across helm upgrades. The Dhall content
           is small and operator-controlled, so parsing on a quote boundary is sufficient. */ -}}
    {{- $dhallText := index $existing.data "minio.dhall" | b64dec -}}
    {{- range $line := splitList "\n" $dhallText -}}
      {{- if hasPrefix "  { minio_access_key = " $line -}}
        {{- $tokens := splitList "\"" $line -}}
        {{- if ge (len $tokens) 2 -}}
          {{- $username = index $tokens 1 -}}
        {{- end -}}
      {{- end -}}
      {{- if hasPrefix "  , minio_secret_key = " $line -}}
        {{- $tokens := splitList "\"" $line -}}
        {{- if ge (len $tokens) 2 -}}
          {{- $password = index $tokens 1 -}}
        {{- end -}}
      {{- end -}}
    {{- end -}}
  {{- else if hasKey $existing.data "MINIO_ACCESS_KEY_ID" -}}
    {{- /* Legacy env-var-shaped data still present (pre-2.22). Reuse it so credentials persist. */ -}}
    {{- $username = index $existing.data "MINIO_ACCESS_KEY_ID" | b64dec -}}
    {{- $password = index $existing.data "MINIO_SECRET_ACCESS_KEY" | b64dec -}}
  {{- end -}}
{{- end -}}
{{- if eq $username "" -}}
  {{- $username = printf "prodbox-gateway-%s" (randAlphaNum 8 | lower) -}}
{{- end -}}
{{- if eq $password "" -}}
  {{- $password = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-minio-creds
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  minio.dhall: |-
    { minio_access_key = {{ $username | quote }}
    , minio_secret_key = {{ $password | quote }}
    }
