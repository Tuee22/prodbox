global:
  namespace: gateway
  rootChart: gateway

# Namespaces the gateway chart keeps present before dependent chart stacks
# run. Secret materialization is Vault-backed in each workload chart; the
# gateway daemon no longer writes cross-namespace Kubernetes Secrets.
rbac:
  targetNamespaces:
    - keycloak
    - vscode
    - gateway

# Pod anti-affinity for HA defaults. Dev mode (suppressing anti-affinity)
# is controlled by chart_platform.py via _ha_values().
podAntiAffinity:
  enabled: true

podAnnotations: {}

image:
  # The single union runtime image (also used by api/websocket). The supported
  # `prodbox charts` path overrides this with the machine-identity tag imported
  # into local RKE2 containerd by `prodbox rke2 ensure`. The gateway role is
  # selected by this chart's container `args:` (`gateway start …`).
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# REST/event ports the daemon binds inside each pod.
ports:
  rest: 8443
  events: 8444

# NodePort exposed by the gateway-nodeport Service for host-CLI access.
# The default matches the port the iptables rule installed by
# `prodbox host firewall gateway-restrict` restricts to loopback ingress.
nodePort:
  rest: 30443

# Daemon timing knobs. The defaults align with the in-pod test suite.
timing:
  heartbeatIntervalSeconds: 0.5
  reconnectIntervalSeconds: 0.5
  syncIntervalSeconds: 1.0
  heartbeatTimeoutSeconds: 5

# Mesh node ranking. The first entry is the preferred Route 53 writer.
# Each entry is a stable node id; the chart renders one Deployment +
# Service named `gateway-<nodeId>` per entry.
nodes:
  rankedIds:
    - node-a
    - node-b
    - node-c

# Route 53 ownership configuration. The dns_write_gate section is mounted
# into the daemon config so the elected leader keeps the named record
# pointed at the current public IP.
dnsWriteGate:
  enabled: true
  zoneId: ""
  fqdn: ""
  ttl: 60
  awsRegion: ""

# Sprint 3.18: gateway secret-bearing config fields are rendered as
# SecretRef.Vault Dhall values and resolved directly by the daemon through
# Vault Kubernetes auth.
vault:
  address: http://vault.vault.svc.cluster.local:8200
  authPath: kubernetes
  role: gateway-gateway
  serviceAccountTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  paths:
    eventKeyNodeA: gateway/gateway/node-a/event-key
    eventKeyNodeB: gateway/gateway/node-b/event-key
    eventKeyNodeC: gateway/gateway/node-c/event-key
    aws: gateway/gateway/aws
    minio: gateway/gateway/minio

# In-cluster MinIO endpoint URL for gateway-owned object-store access.
# The default points at the home-substrate MinIO Service; AWS-substrate
# deploys override this via `prodbox charts deploy gateway --substrate aws`
# (the substrate adapter renders the AWS-side Service DNS).
minio:
  endpointUrl: "http://minio.prodbox.svc.cluster.local:9000"

# cert-manager Issuer/Certificate material for mesh mTLS. A self-signed
# CA Issuer is created in the gateway namespace and used to mint one
# Certificate per node id with CN=<nodeId> so the daemon can validate
# peer node identity from the TLS handshake.
certManager:
  enabled: true
  caIssuerName: gateway-ca-issuer
  caCertificateName: gateway-ca
  caSecretName: gateway-ca-tls
  caCommonName: gateway-mesh-ca
