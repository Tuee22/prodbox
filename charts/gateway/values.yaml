global:
  namespace: gateway
  rootChart: gateway

# Namespaces the gateway chart keeps present before dependent chart stacks
# run. Secret materialization is Vault-backed in each workload chart; the
# gateway daemon no longer writes cross-namespace Kubernetes Secrets.
rbac:
  targetNamespaces:
    - keycloak
    - vscode
    - gateway

# Pod anti-affinity for HA defaults. Dev mode (suppressing anti-affinity)
# is controlled by chart_platform.py via _ha_values().
podAntiAffinity:
  enabled: true

podAnnotations: {}

image:
  # The single union runtime image (also used by api/websocket). The supported
  # `prodbox charts` path overrides this with the machine-identity tag imported
  # into local RKE2 containerd by `prodbox rke2 ensure`. The gateway role is
  # selected by this chart's container `args:` (`gateway start …`).
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static gateway chart identities — REST/event container ports, the host-facing
# NodePort, and the Pod ServiceAccount name — generated from the one compiled
# `Prodbox.Gateway.ChartStatics` source of truth. The NodePort default matches
# the port the iptables rule installed by `prodbox host firewall
# gateway-restrict` restricts to loopback ingress, and the ServiceAccount name
# is the Vault Kubernetes-auth role identity (`VaultRoleGatewayDaemon`).
# prodbox:gateway-chart-statics.values:start
ports:
  rest: 8443
  events: 8444
nodePort:
  rest: 30443
serviceAccount:
  name: prodbox-gateway-daemon
# prodbox:gateway-chart-statics.values:end

# prodbox:gateway-probes.values:start
probes:
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    path: /readyz
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1
# prodbox:gateway-probes.values:end

# Daemon timing knobs. The defaults align with the in-pod test suite.
timing:
  heartbeatIntervalSeconds: 0.5
  reconnectIntervalSeconds: 0.5
  syncIntervalSeconds: 1.0
  heartbeatTimeoutSeconds: 5

# Mesh node ranking. The first entry is the preferred Route 53 writer.
# Each entry is a stable node id; the chart renders one StatefulSet +
# Service named `gateway-<nodeId>` per entry (Sprint 3.26).
nodes:
  rankedIds:
    - node-a
    - node-b
    - node-c

# Sprint 3.26: per-emitter stable-workload + retained-journal + Lease inputs. The
# supported ChartPlatform render injects this from the validated
# `Prodbox.Gateway.Emitter.Persistence` projection (keyed on substrate); this
# home-substrate default lets bare `helm template` / chart lint render the
# per-node StatefulSets and the emitter-journal volumes. The `nodes` order
# matches `nodes.rankedIds` by index.
emitterPersistence:
  substrate: home-local
  controllerKind: StatefulSet
  journalMountPath: /var/lib/prodbox/gateway-emitter
  lease:
    apiVersion: coordination.k8s.io/v1
    resource: leases
    verbs:
      - get
      - create
      - update
  nodes:
    - nodeId: node-a
      leaseName: prodbox-emitter-node-a
      serviceAccountName: prodbox-gateway-daemon
      journal:
        kind: nodePinnedHostPath
        hostPath: /var/lib/prodbox/gateway-emitter-journals/node-a
    - nodeId: node-b
      leaseName: prodbox-emitter-node-b
      serviceAccountName: prodbox-gateway-daemon
      journal:
        kind: nodePinnedHostPath
        hostPath: /var/lib/prodbox/gateway-emitter-journals/node-b
    - nodeId: node-c
      leaseName: prodbox-emitter-node-c
      serviceAccountName: prodbox-gateway-daemon
      journal:
        kind: nodePinnedHostPath
        hostPath: /var/lib/prodbox/gateway-emitter-journals/node-c

# Production values inject a complete, non-secret daemon-frame Tier-0 document
# with the selected substrate's cluster identity. The empty chart default lets
# generic lint/template invocations omit this ConfigMap key; the supported
# ChartPlatform path always supplies it.
tier0:
  prodboxDhall: ""

# Route 53 ownership configuration. The dns_write_gate section is mounted
# into the daemon config so the elected leader keeps the named record
# pointed at the current public IP.
dnsWriteGate:
  enabled: true
  zoneId: ""
  fqdn: ""
  ttl: 60
  awsRegion: ""

# Sprint 3.18: gateway secret-bearing config fields are rendered as
# SecretRef.Vault Dhall values and resolved directly by the daemon through
# Vault Kubernetes auth.
vault:
  address: http://vault.vault.svc.cluster.local:8200
  authPath: kubernetes
  # The daemon reads the object-store HMAC (secret/object-store/hmac) and the
  # prodbox-pulumi-state Transit key for the encrypted Pulumi backend, which live
  # on the `prodbox-gateway` policy — bound to this `prodbox-gateway-daemon` role.
  # That role also binds the `gateway-gateway` policy for the daemon's
  # per-node event-key / aws / minio KV reads (see Vault/Reconcile.hs).
  role: prodbox-gateway-daemon
  serviceAccountTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  paths:
    # Sprint 3.26: per-node event-key paths are derived parametrically from
    # `nodes.rankedIds` in configmap-config.yaml (`gateway/gateway/<nodeId>/event-key`),
    # so the event-key set is substrate-variable (2 on home, 3 on AWS) and matches
    # Orders membership exactly. No fixed eventKeyNode{A,B,C} default is kept here.
    aws: gateway/gateway/aws
    minio: gateway/gateway/minio

# In-cluster MinIO endpoint URL for gateway-owned object-store access.
# The default points at the home-substrate MinIO Service; AWS-substrate
# deploys override this via `prodbox charts deploy gateway --substrate aws`
# (the substrate adapter renders the AWS-side Service DNS).
minio:
  endpointUrl: "http://minio.prodbox.svc.cluster.local:9000"

# cert-manager Issuer/Certificate material for mesh mTLS. A self-signed
# CA Issuer is created in the gateway namespace and used to mint one
# Certificate per node id with CN=<nodeId> so the daemon can validate
# peer node identity from the TLS handshake.
certManager:
  enabled: true
  caIssuerName: gateway-ca-issuer
  caCertificateName: gateway-ca
  caSecretName: gateway-ca-tls
  caCommonName: gateway-mesh-ca
