global:
  namespace: default
  rootChart: vscode

replicaCount: 1

podAntiAffinity:
  enabled: true

gateway:
  className: prodbox-public-edge
  name: public-edge
  listenerName: https
  tlsSecretName: public-edge-tls
  # Deploy-time default; set by Prodbox.Lib.ChartPlatform.valuesForVscode to
  # the single ZeroSSL ClusterIssuer (Prodbox.PublicEdge.publicEdgeClusterIssuerName).
  clusterIssuer: zerossl-dns01
  host: test.resolvefintech.com
  pathPrefix: /vscode

oidc:
  clientId: vscode
  clientSecret: change-me
  issuer: https://test.resolvefintech.com/auth/realms/prodbox
  authorizationEndpoint: https://test.resolvefintech.com/auth/realms/prodbox/protocol/openid-connect/auth
  tokenEndpoint: http://keycloak.vscode.svc.cluster.local:8080/auth/realms/prodbox/protocol/openid-connect/token
  providerBackend:
    serviceName: keycloak
    servicePort: 8080
  redirectURL: https://test.resolvefintech.com/vscode/oauth2/callback
  logoutPath: /logout
  securityPolicyName: vscode-oidc

vscode:
  image: 127.0.0.1:30080/prodbox/code-server-mirror:4.98.2
  basePath: /vscode

storage:
  # The `data` volumeClaimTemplate's class + size. Sprint 4.31:
  # Prodbox.Lib.ChartPlatform.valuesForVscode overrides storage.className to the
  # active substrate's class (manual on home, gp2 on AWS); the prebound PV the
  # StatefulSet adopts lives at `.data/vscode/vscode/0`.
  className: manual
  size: 50Gi
