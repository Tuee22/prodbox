{{/* prodbox:route-registry:start */}}
{{/* Canonical public-edge route inventory generated from `src/Prodbox/PublicEdge.hs`. */}}
{{/* PUBLIC_FQDN=test.resolvefintech.com */}}
{{/* ROUTE auth=/auth */}}
{{/* ROUTE vscode=/vscode */}}
{{/* ROUTE api=/api */}}
{{/* ROUTE websocket=/ws */}}
{{/* ROUTE harbor=/harbor */}}
{{/* ROUTE minio=/minio */}}
{{/* ADMIN_ROUTE harbor=/harbor */}}
{{/* ADMIN_ROUTE minio=/minio */}}
{{/* prodbox:route-registry:end */}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vscode
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      sectionName: {{ .Values.gateway.listenerName | quote }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gateway.pathPrefix | quote }}
      backendRefs:
        - name: vscode
          port: 8080
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.oidc.securityPolicyName | quote }}
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: vscode
  oidc:
    provider:
      backendRefs:
        - name: {{ .Values.oidc.providerBackend.serviceName | quote }}
          port: {{ .Values.oidc.providerBackend.servicePort }}
      issuer: {{ .Values.oidc.issuer | quote }}
      authorizationEndpoint: {{ .Values.oidc.authorizationEndpoint | quote }}
      tokenEndpoint: {{ .Values.oidc.tokenEndpoint | quote }}
    clientID: {{ .Values.oidc.clientId | quote }}
    clientSecret:
      name: {{ printf "%s-client" .Values.oidc.securityPolicyName | quote }}
    redirectURL: {{ .Values.oidc.redirectURL | quote }}
    logoutPath: {{ .Values.oidc.logoutPath | quote }}
