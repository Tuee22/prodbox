global:
  namespace: default
  rootChart: api

replicaCount: 2

podAntiAffinity:
  enabled: true

podAnnotations: {}

image:
  repository: 127.0.0.1:30080/prodbox/prodbox-public-edge-workload
  tag: latest

gateway:
  name: public-edge
  namespace: vscode
  listenerName: https
  host: test.resolvefintech.com
  pathPrefix: /api

jwt:
  securityPolicyName: api-jwt
  providerName: keycloak
  issuer: https://test.resolvefintech.com/auth/realms/prodbox
  audience: prodbox-api
  jwksUri: http://keycloak.vscode.svc.cluster.local:8080/auth/realms/prodbox/protocol/openid-connect/certs
  jwksBackend:
    namespace: vscode
    serviceName: keycloak
    servicePort: 8080
    referenceGrantName: api-keycloak-jwks
  routeClaimName: prodbox_route
  routeClaimValue: api

api:
  port: 8080
