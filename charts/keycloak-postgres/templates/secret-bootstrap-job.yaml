{{- /*
Sprint 3.13 seventh chunk: Helm pre-install hook that POSTs to the
gateway daemon's `/v1/secret/ensure-namespace` endpoint so the three
Patroni-role Secrets (`prodbox-keycloak-pg-pguser-keycloak`,
`prodbox-keycloak-pg-pguser-postgres`, `prodbox-keycloak-pg-primaryuser`)
are materialized in this release's namespace BEFORE the `00-secrets.yaml`
chart Secrets render (those then `lookup` the daemon-applied Secrets via
the Helm `lookup` function instead of supplying static placeholders).

The Job runs in this chart's namespace, calls the gateway daemon's
unsuffixed in-cluster ClusterIP at
`gateway.<gateway-namespace>.svc.cluster.local:<rest-port>`, and exits
with the daemon's response status. `--max-time 30` bounds the wait at
30 seconds; `--retry 5` covers transient daemon-pod readiness flaps.

The `helm.sh/hook-weight: -10` runs this Job before the chart's other
pre-install hooks (Patroni operator wait, etc.). The
`hook-delete-policy` cleans the Job up on completion so successive
upgrades don't leak completed Pods.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-namespace-{{ .Release.Name }}
  labels:
    {{- include "keycloak-postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  # Sprint 3.13 chunk 26: per-Job-pod retry window must stay well under
  # helm's `--timeout 30m0s` so helm sees the Job complete (or fail) in
  # time. Chunk 25's aggressive budget (30 retries × 5s × 60s max-time)
  # let a single pod run for ~32 min, exceeding helm's hook wait. The
  # tuned budget below (12 retries × 5s × 30s max-time = ~90s per pod)
  # × backoffLimit 6 = ~9 min total wall-clock — generous enough to
  # cover the Service-endpoint-propagation race on fresh-cluster
  # bootstrap (proven in live testing to take seconds, not minutes), but
  # tight enough that helm sees the Job's terminal state before its own
  # timeout.
  backoffLimit: 6
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "keycloak-postgres.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ensure-namespace
          image: 127.0.0.1:30080/prodbox/curl-mirror:8.11.0
          command:
            - sh
            - -c
            - |
              set -eu
              payload='{"namespace":"{{ .Release.Namespace }}","release":"{{ .Release.Name }}"}'
              curl -fsS \
                --max-time 30 \
                --retry 12 \
                --retry-delay 5 \
                --retry-connrefused \
                -X POST \
                -H 'Content-Type: application/json' \
                -d "${payload}" \
                http://gateway.gateway.svc.cluster.local:{{ .Values.prodboxGateway.restPort }}/v1/secret/ensure-namespace
