apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: api
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name | quote }}
      namespace: {{ .Values.gateway.namespace | quote }}
      sectionName: {{ .Values.gateway.listenerName | quote }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - backendRefs:
        - name: api
          port: {{ .Values.api.port }}
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: {{ .Values.jwt.securityPolicyName | quote }}
  labels:
    {{- include "api.labels" . | nindent 4 }}
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: api
  jwt:
    providers:
      - name: {{ .Values.jwt.providerName | quote }}
        issuer: {{ .Values.jwt.issuer | quote }}
        audiences:
          - {{ .Values.jwt.audience | quote }}
        remoteJWKS:
          uri: {{ .Values.jwt.jwksUri | quote }}
  authorization:
    defaultAction: Deny
    rules:
      - name: allow-api
        action: Allow
        principal:
          jwt:
            provider: {{ .Values.jwt.providerName | quote }}
            claims:
              - name: {{ .Values.jwt.routeClaimName | quote }}
                values:
                  - {{ .Values.jwt.routeClaimValue | quote }}
