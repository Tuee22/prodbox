apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vscode
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "vscode.labels" . | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: vscode
          image: {{ .Values.vscode.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --auth
            - none
            - --bind-addr
            - 0.0.0.0:8080
            - /workspace
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.vscode.existingClaim | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode-auth-proxy
  labels:
    {{- include "vscode.oauth2ProxyLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vscode-auth-proxy
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "vscode.oauth2ProxyLabels" . | nindent 8 }}
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          imagePullPolicy: IfNotPresent
          args:
            - --http-address=0.0.0.0:4180
            - --provider=oidc
            - --oidc-issuer-url={{ .Values.oauth2Proxy.oidcDiscoveryUrl }}
            - --insecure-oidc-skip-issuer-verification=true
            - --client-id={{ .Values.oauth2Proxy.clientId }}
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --redirect-url={{ .Values.oauth2Proxy.redirectUrl }}
            - --upstream={{ .Values.oauth2Proxy.upstream }}
            - --email-domain=*
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --pass-access-token=true
            - --pass-authorization-header=true
            - --set-xauthrequest=true
            - --cookie-secure=true
            - --cookie-samesite=lax
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vscode-auth-proxy
                  key: OAUTH2_PROXY_CLIENT_SECRET
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: vscode-auth-proxy
                  key: OAUTH2_PROXY_COOKIE_SECRET
          ports:
            - name: http
              containerPort: 4180
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
