config:
  prodbox:metallbPool:
    type: string
    description: MetalLB IP address pool range
  prodbox:ingressLbIp:
    type: string
    description: Traefik LoadBalancer IP address
  prodbox:demoFqdn:
    type: string
    description: Demo FQDN for DNS record
  prodbox:demoTtl:
    type: number
    default: 60
  prodbox:route53ZoneId:
    type: string
  prodbox:awsRegion:
    type: string
    default: us-east-1
  prodbox:awsAccessKeyId:
    type: string
    secret: true
  prodbox:awsSecretAccessKey:
    type: string
    secret: true
  prodbox:awsSessionToken:
    type: string
    secret: true
    default: ""
  prodbox:acmeServer:
    type: string
    default: "https://acme-staging-v02.api.letsencrypt.org/directory"
  prodbox:acmeEmail:
    type: string
  prodbox:acmeEabKeyId:
    type: string
    default: ""
  prodbox:acmeEabHmacKey:
    type: string
    secret: true
    default: ""
  prodbox:enableDnsBootstrap:
    type: boolean
    default: true
  prodbox:bootstrapPublicIpOverride:
    type: string
    default: ""

variables:
  prodboxId:
    fn::invoke:
      function: std:getenv
      arguments:
        name: PRODBOX_ID
      return: result
  prodboxLabelValue:
    fn::invoke:
      function: std:substr
      arguments:
        input: ${prodboxId}
        offset: 0
        length: 63
      return: result
  publicIp:
    fn::invoke:
      function: http:http:get
      arguments:
        url: https://api.ipify.org
      return: body
  dnsBootstrapIp:
    fn::if:
      - ${config.prodbox:bootstrapPublicIpOverride} != ""
      - ${config.prodbox:bootstrapPublicIpOverride}
      - ${publicIp}

resources:
  awsProvider:
    type: pulumi:providers:aws
    properties:
      region: ${config.prodbox:awsRegion}
      accessKey: ${config.prodbox:awsAccessKeyId}
      secretKey: ${config.prodbox:awsSecretAccessKey}
      token: ${config.prodbox:awsSessionToken}

  # Phase 1: MetalLB - LoadBalancer IP assignment
  metallbNamespace:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: metallb-system
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}

  metallbRelease:
    type: kubernetes:helm.sh/v3:Release
    properties:
      chart: metallb
      version: "0.14.9"
      namespace: metallb-system
      repositoryOpts:
        repo: https://metallb.github.io/metallb
      skipAwait: false
      values:
        commonLabels:
          prodbox.io/id: ${prodboxLabelValue}
        commonAnnotations:
          prodbox.io/id: ${prodboxId}
    options:
      dependsOn:
        - ${metallbNamespace}

  metallbIpPool:
    type: kubernetes:apiextensions.k8s.io/v1:CustomResource
    properties:
      apiVersion: metallb.io/v1beta1
      kind: IPAddressPool
      metadata:
        name: default-pool
        namespace: metallb-system
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}
      spec:
        addresses:
          - ${config.prodbox:metallbPool}
    options:
      dependsOn:
        - ${metallbRelease}

  metallbL2Advertisement:
    type: kubernetes:apiextensions.k8s.io/v1:CustomResource
    properties:
      apiVersion: metallb.io/v1beta1
      kind: L2Advertisement
      metadata:
        name: default-advertisement
        namespace: metallb-system
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}
      spec:
        ipAddressPools:
          - default-pool
    options:
      dependsOn:
        - ${metallbIpPool}

  # Phase 2: Traefik Ingress Controller
  traefikNamespace:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: traefik-system
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}

  traefikRelease:
    type: kubernetes:helm.sh/v3:Release
    properties:
      chart: traefik
      version: "32.0.0"
      namespace: traefik-system
      repositoryOpts:
        repo: https://traefik.github.io/charts
      skipAwait: false
      values:
        service:
          type: LoadBalancer
          spec:
            loadBalancerIP: ${config.prodbox:ingressLbIp}
        ports:
          web:
            expose:
              default: true
          websecure:
            expose:
              default: true
        ingressClass:
          name: traefik
          isDefaultClass: false
        logs:
          access:
            enabled: true
        metrics:
          prometheus:
            entryPoint: metrics
        commonLabels:
          prodbox.io/id: ${prodboxLabelValue}
        commonAnnotations:
          prodbox.io/id: ${prodboxId}
    options:
      dependsOn:
        - ${traefikNamespace}
        - ${metallbL2Advertisement}

  # Phase 3: cert-manager
  certManagerNamespace:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: cert-manager
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}

  certManagerRelease:
    type: kubernetes:helm.sh/v3:Release
    properties:
      chart: cert-manager
      version: "v1.16.2"
      namespace: cert-manager
      repositoryOpts:
        repo: https://charts.jetstack.io
      skipAwait: false
      values:
        crds:
          enabled: true
        global:
          leaderElection:
            namespace: cert-manager
        podLabels:
          prodbox.io/id: ${prodboxLabelValue}
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
    options:
      dependsOn:
        - ${certManagerNamespace}

  # Phase 4: Route 53 credentials secret for ClusterIssuer
  route53CredentialsSecret:
    type: kubernetes:core/v1:Secret
    properties:
      metadata:
        name: route53-credentials
        namespace: cert-manager
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}
      stringData:
        access-key-id: ${config.prodbox:awsAccessKeyId}
        secret-access-key: ${config.prodbox:awsSecretAccessKey}
    options:
      dependsOn:
        - ${certManagerNamespace}

  # Phase 5: ClusterIssuer with DNS-01 validation
  clusterIssuer:
    type: kubernetes:apiextensions.k8s.io/v1:CustomResource
    properties:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-http01
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}
      spec:
        acme:
          server: ${config.prodbox:acmeServer}
          email: ${config.prodbox:acmeEmail}
          privateKeySecretRef:
            name: letsencrypt-account-key
          solvers:
            - dns01:
                route53:
                  region: ${config.prodbox:awsRegion}
                  hostedZoneID: ${config.prodbox:route53ZoneId}
                  accessKeyIDSecretRef:
                    name: route53-credentials
                    key: access-key-id
                  secretAccessKeySecretRef:
                    name: route53-credentials
                    key: secret-access-key
    options:
      dependsOn:
        - ${certManagerRelease}
        - ${traefikRelease}
        - ${route53CredentialsSecret}

  # Phase 6: DNS bootstrap A record (optional)
  demoARecord:
    type: aws:route53:Record
    properties:
      zoneId: ${config.prodbox:route53ZoneId}
      name: ${config.prodbox:demoFqdn}
      type: A
      ttl: ${config.prodbox:demoTtl}
      records:
        - ${dnsBootstrapIp}
      allowOverwrite: true
    options:
      provider: ${awsProvider}
      ignoreChanges:
        - records

outputs:
  metallb_chart_version: "0.14.9"
  metallb_ip_pool: ${config.prodbox:metallbPool}
  traefik_chart_version: "32.0.0"
  traefik_lb_ip: ${config.prodbox:ingressLbIp}
  cert_manager_chart_version: "v1.16.2"
  cluster_issuer_name: letsencrypt-http01
  acme_server: ${config.prodbox:acmeServer}
  demo_fqdn: ${config.prodbox:demoFqdn}
  demo_ttl: ${config.prodbox:demoTtl}
  dns_bootstrap_enabled: ${config.prodbox:enableDnsBootstrap}
  prodbox_id: ${prodboxId}
