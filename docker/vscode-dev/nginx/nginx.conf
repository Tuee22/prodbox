# njs module — provides js_import, js_content, js_set directives
load_module modules/ngx_http_js_module.so;

# Declare which environment variables nginx should preserve for njs.
# Values are injected by docker-compose (or the K8s Pod spec).
env KEYCLOAK_INTERNAL_URL;
env KEYCLOAK_BROWSER_URL;
env KEYCLOAK_REALM;
env OIDC_CLIENT_ID;
env OIDC_CLIENT_SECRET;
env OIDC_REDIRECT_URI;

events {
    worker_connections 1024;
}

http {
    js_path /etc/nginx/njs/;
    js_import oidc from oidc.js;

    # Computed once per request by njs; used by the @oidc_login named location.
    js_set $oidc_login_url oidc.loginUrl;

    upstream code_server {
        server code-server:8080;
    }

    upstream keycloak_backend {
        server keycloak:8080;
    }

    # Docker's internal DNS — required for ngx.fetch hostname resolution in njs.
    resolver 127.0.0.11 valid=30s;

    server {
        listen 80;
        server_name _;

        # ── OIDC callback ──────────────────────────────────────────────────
        # Receives ?code=... from Keycloak, exchanges for token, sets cookie.
        location = /auth/callback {
            js_content oidc.handleCallback;
        }

        # ── Keycloak pass-through ──────────────────────────────────────────
        # Serves Keycloak login UI and token/userinfo endpoints to the browser.
        location /auth/ {
            proxy_pass         http://keycloak_backend/auth/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_buffer_size  128k;
            proxy_buffers      4 256k;
        }

        # ── Internal auth-check subrequest ─────────────────────────────────
        # Called by auth_request for every proxied request.
        # Returns 204 if the session cookie validates against Keycloak userinfo,
        # 401 otherwise.
        location = /_auth_check {
            internal;
            js_content oidc.checkAuth;
        }

        # ── Login redirect ──────────────────────────────────────────────────
        # Named location triggered by error_page 401 when auth_request fails.
        # $oidc_login_url is computed by njs via js_set; nginx issues the redirect
        # natively so the Location header is set correctly.
        location @oidc_login {
            return 302 $oidc_login_url;
        }

        # ── Protected code-server ───────────────────────────────────────────
        location / {
            auth_request  /_auth_check;
            error_page 401 = @oidc_login;

            proxy_pass         http://code_server;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # WebSocket support required by code-server
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 86400s;
        }
    }
}
