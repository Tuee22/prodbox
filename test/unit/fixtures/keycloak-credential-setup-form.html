<!DOCTYPE html>
<html>
  <head><title>Update password</title></head>
  <body>
    <form id="kc-passwd-update-form"
          action="https://test.resolvefintech.com/auth/realms/prodbox/login-actions/required-action?session_code=SCODE&amp;execution=UPDATE_PASSWORD&amp;client_id=account&amp;tab_id=TID"
          method="post">
      <input type="hidden" name="session_code" value="SCODE">
      <input type="hidden" name="execution" value="UPDATE_PASSWORD">
      <input type="hidden" name="client_id" value="account">
      <input type="hidden" name="tab_id" value="TID">
      <label for="password-new">New password</label>
      <input type="password" id="password-new" name="password" autocomplete="new-password" />
      <label for="password-confirm">Confirm password</label>
      <input type="password" id="password-confirm" name="password-confirm" autocomplete="new-password" />
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
