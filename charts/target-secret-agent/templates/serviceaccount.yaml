{{- /*
ServiceAccount the Target Secret Agent Pod runs as. It is the Kubernetes-auth
identity for the least-privilege Vault role (`VaultRoleTargetSecretAgent`),
distinct from every other control-plane workload's role. The name is
`.Values`-driven from the compiled
Prodbox.Lifecycle.TargetSecretAgent.ChartStatics so it can never drift from the
compiled identity.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "target-secret-agent.labels" . | nindent 4 }}
