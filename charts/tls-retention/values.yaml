global:
  namespace: tls-retention
  rootChart: tls-retention

podAnnotations: {}

image:
  # The single union runtime image (also used by the gateway, broker, and
  # api/websocket workloads). The TLS Retention Adapter role is selected by this
  # chart's container `args:` (`tls-retention start …`), so the physically
  # separate adapter Pod shares the image but never the identity, config mount,
  # or failure domain of the Gateway Runtime.
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static TLS Retention Adapter chart identities — the Pod ServiceAccount, the
# least-privilege Vault Kubernetes-auth role, and the constant-time lifecycle
# probe paths — generated from the one compiled
# `Prodbox.Lifecycle.TlsRetention.ChartStatics` source of truth. The
# ServiceAccount name equals the Vault role (`VaultRoleTlsRetention`) so the Pod
# authenticates to Vault Kubernetes auth as its own least-privilege identity,
# and the probe paths are constant-time route projections so a kubelet probe can
# never point at a path the adapter does not serve. This block is regenerated by
# `prodbox docs generate`; do not hand-edit it.
# prodbox:tls-retention-chart-statics.values:start
serviceAccount:
  name: prodbox-tls-retention
vault:
  role: prodbox-tls-retention
probes:
  liveness: /healthz
  readiness: /readyz
# prodbox:tls-retention-chart-statics.values:end

# Lifecycle probe timing. The adapter's liveness/readiness endpoints are
# constant-time route projections; deep capability observations (S3
# retain/restore) execute through the adapter's own client, never in a kubelet
# probe.
probeTiming:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1

# The adapter listen port for its constant-time `/healthz`/`/readyz` route
# surface.
listener:
  port: 8600

# The Guaranteed-QoS resource envelope (request == limit) is injected at render
# time from the typed `capacity.resource_plan` (the `tls-retention` workload
# profile) by `Prodbox.Lib.ChartPlatform.attachResourcePlanValues` into
# `.Values.resources.tlsRetention`, exactly like the gateway and bootstrap-broker
# charts — the capacity plan is the single source of truth, so no chart-local
# default is kept here.

# The mounted TLS Retention Adapter Dhall (runtime role `tls-retention`). The
# empty default lets generic lint/template invocations omit the ConfigMap body;
# the supported ChartPlatform render always supplies it.
config:
  roleDhall: ""
