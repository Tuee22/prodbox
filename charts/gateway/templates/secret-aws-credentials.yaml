{{- /*
Sprint 2.22 (May 24, 2026): the gateway-aws-credentials Secret now ships a
Dhall fragment at @/etc/gateway/secrets/aws.dhall@ instead of three env-var
keys. The daemon's config.dhall imports this file and binds the
credentials into the @boot.aws_creds@ field per
@documents/engineering/config_doctrine.md §6@.

The Secret name is preserved so existing operator RBAC bindings still grant
access. The data key changes from @AWS_ACCESS_KEY_ID@/@AWS_SECRET_ACCESS_KEY@/
@AWS_SESSION_TOKEN@ to a single @aws.dhall@ key holding a Dhall record.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-aws-credentials
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  aws.dhall: |-
    { access_key_id = {{ .Values.aws.accessKeyId | quote }}
    , secret_access_key = {{ .Values.aws.secretAccessKey | quote }}
    , session_token =
        {{- if .Values.aws.sessionToken }}
        Some {{ .Values.aws.sessionToken | quote }}
        {{- else }}
        None Text
        {{- end }}
    , region = {{ .Values.dnsWriteGate.awsRegion | quote }}
    }
