global:
  namespace: bootstrap-broker
  rootChart: bootstrap-broker

podAnnotations: {}

image:
  # The single union runtime image (also used by the gateway and api/websocket
  # workloads). The broker role is selected by this chart's container `args:`
  # (`bootstrap-broker start тАж`), so the physically separate broker Pod shares
  # the image but never the identity, config mount, or failure domain of the
  # Gateway Runtime.
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static Bootstrap Broker chart identities тАФ the Pod ServiceAccount, the
# bootstrap-only Vault Kubernetes-auth role, and the constant-time lifecycle
# probe paths тАФ generated from the one compiled
# `Prodbox.Bootstrap.Broker.ChartStatics` source of truth. The ServiceAccount
# name equals the Vault role (`VaultRoleBootstrapBroker`) so the Pod
# authenticates to Vault Kubernetes auth as its own bootstrap-only identity,
# and the probe paths are projections of the closed `BrokerRoute` registry so a
# kubelet probe can never point at a path the broker does not serve. This block
# is regenerated by `prodbox docs generate`; do not hand-edit it.
# prodbox:bootstrap-broker-chart-statics.values:start
serviceAccount:
  name: prodbox-bootstrap-broker
vault:
  role: prodbox-bootstrap-broker
probes:
  liveness: /healthz
  readiness: /readyz
# prodbox:bootstrap-broker-chart-statics.values:end

# Lifecycle probe timing. The broker's liveness/readiness endpoints are
# constant-time route projections (Sprint 2.34 route registry); deep capability
# observations execute through the broker's own client, never in a kubelet
# probe.
probeTiming:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1

# The broker listen port is deployment configuration, deliberately NOT a
# compiled static (unlike the gateway): the broker binds a loopback-restricted
# Service whose port the operator chooses per cluster.
listener:
  port: 8600

# The Guaranteed-QoS resource envelope (request == limit) is injected at render
# time from the typed `capacity.resource_plan` (the `bootstrap-broker` workload
# profile) by `Prodbox.Lib.ChartPlatform.attachResourcePlanValues` into
# `.Values.resources.bootstrapBroker`, exactly like the gateway chart тАФ the
# capacity plan is the single source of truth, so no chart-local default is kept
# here. Control-plane demand therefore never hides behind a combined gateway
# envelope (resource_scaling_doctrine.md ┬з 2E).

# The mounted broker Dhall (runtime role `bootstrap-broker`, config identity
# `bootstrap-broker-config-v1`, mounted at /etc/bootstrap-broker/config). The
# empty default lets generic lint/template invocations omit the ConfigMap body;
# the supported ChartPlatform render always supplies it.
config:
  brokerDhall: ""
