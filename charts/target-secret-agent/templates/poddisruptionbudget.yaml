{{- /*
The Target Secret Agent mediates allowlisted target-secret delivery, so a
voluntary disruption (node drain) must not evict its sole replica while consumers
depend on it. `minAvailable: 1` over its one replica blocks voluntary eviction;
involuntary disruption and the RollingUpdate rollout are unaffected.
*/ -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: target-secret-agent
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "target-secret-agent.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "target-secret-agent.selectorLabels" . | nindent 6 }}
