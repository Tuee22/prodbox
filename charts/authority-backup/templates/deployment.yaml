{{- /*
The always-on Authority Backup Adapter workload (home-only). A single-writer
backup singleton (replicas: 1, strategy Recreate): it reads ONLY
`secret/aws/authority-backup-store` and backs up authority envelope/blob state
to its S3 prefix, so two overlapping instances must never race. It runs the
`authority-backup` runtime role via `authority-backup start`, authenticates to
Vault Kubernetes auth as its own least-privilege ServiceAccount, and exposes
only the constant-time `/healthz`/`/readyz` probes as kubelet probes.
*/ -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authority-backup
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "authority-backup.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "authority-backup.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "authority-backup.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: authority-backup
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources.authorityBackup | nindent 12 }}
          args:
            - authority-backup
            - start
            - --config
            - /etc/authority-backup/config/config.dhall
            {{- range .Values.runtime.rtsArguments }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: authority
              containerPort: {{ .Values.listener.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              # Directory-style mount (no subPath) so the kubelet's atomic
              # `..data` symlink swap on ConfigMap update propagates to the
              # adapter's file-watch reload loop.
              mountPath: /etc/authority-backup/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness | quote }}
              port: authority
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probeTiming.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probeTiming.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probeTiming.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probeTiming.liveness.failureThreshold }}
            successThreshold: {{ .Values.probeTiming.liveness.successThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness | quote }}
              port: authority
              scheme: HTTP
            initialDelaySeconds: {{ .Values.probeTiming.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probeTiming.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probeTiming.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probeTiming.readiness.failureThreshold }}
            successThreshold: {{ .Values.probeTiming.readiness.successThreshold }}
      volumes:
        - name: config
          configMap:
            name: authority-backup-config
