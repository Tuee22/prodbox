global:
  namespace: authority-backup
  rootChart: authority-backup

podAnnotations: {}

image:
  # The single union runtime image (also used by the gateway, broker, and
  # api/websocket workloads). The authority-backup role is selected by this
  # chart's container `args:` (`authority-backup start …`), so the physically
  # separate adapter Pod shares the image but never the identity, config mount,
  # or failure domain of any other control-plane workload.
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static Authority Backup chart identities — the Pod ServiceAccount, the
# least-privilege Vault Kubernetes-auth role, and the constant-time lifecycle
# probe paths — generated from the one compiled
# `Prodbox.Lifecycle.AuthorityBackup.ChartStatics` source of truth. The
# ServiceAccount name equals the Vault role (`VaultRoleAuthorityBackup`) so the
# Pod authenticates to Vault Kubernetes auth as its own least-privilege
# identity. This block is regenerated by `prodbox docs generate`; do not
# hand-edit it.
# prodbox:authority-backup-chart-statics.values:start
serviceAccount:
  name: prodbox-authority-backup
vault:
  role: prodbox-authority-backup
probes:
  liveness: /healthz
  readiness: /readyz
# prodbox:authority-backup-chart-statics.values:end

# Lifecycle probe timing. The adapter's liveness/readiness endpoints are
# constant-time route projections; deep capability observations execute through
# the adapter's own client, never in a kubelet probe.
probeTiming:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1

# The adapter listen port for its constant-time `/healthz`/`/readyz` probe
# surface.
listener:
  port: 8600

# The Guaranteed-QoS resource envelope (request == limit) is injected at render
# time from the typed `capacity.resource_plan` (the `authority-backup` workload
# profile) into `.Values.resources.authorityBackup` by
# `Prodbox.Lib.ChartPlatform` — the capacity plan is the single source of truth,
# so no chart-local default is kept here.

# The mounted adapter Dhall (runtime role `authority-backup`, mounted at
# /etc/authority-backup/config). The empty default lets generic lint/template
# invocations omit the ConfigMap body; the supported ChartPlatform render always
# supplies it.
config:
  roleDhall: ""
