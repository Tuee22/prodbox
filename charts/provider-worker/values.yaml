global:
  namespace: provider-worker
  rootChart: provider-worker

podAnnotations: {}

image:
  # The single union runtime image (also used by the gateway, broker, and
  # api/websocket workloads). The provider-worker role is selected by this
  # chart's container `args:` (`provider-worker start …`), so the physically
  # separate fenced Pod shares the image but never the identity, config mount,
  # or failure domain of the other control-plane workloads.
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static Provider Worker chart identities — the Pod ServiceAccount, the
# least-privilege Vault Kubernetes-auth role, and the constant-time lifecycle
# probe paths — generated from the one compiled
# `Prodbox.Lifecycle.ProviderWorker.ChartStatics` source of truth. The
# ServiceAccount name equals the Vault role (`VaultRoleProviderWorker`) so the
# Pod authenticates to Vault Kubernetes auth as its own fenced identity, and the
# probe paths are constant-time route projections so a kubelet probe can never
# point at a path the worker does not serve. This block is regenerated by
# `prodbox docs generate`; do not hand-edit it.
# prodbox:provider-worker-chart-statics.values:start
serviceAccount:
  name: prodbox-provider-worker
vault:
  role: prodbox-provider-worker
probes:
  liveness: /healthz
  readiness: /readyz
# prodbox:provider-worker-chart-statics.values:end

# Lifecycle probe timing. The provider-worker's liveness/readiness endpoints are
# constant-time route projections; deep capability observations execute through
# the worker's own client, never in a kubelet probe.
probeTiming:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1

# The provider-worker listen port for its constant-time health/readiness route
# surface.
listener:
  port: 8600

# The Guaranteed-QoS resource envelope (request == limit) is injected at render
# time from the typed `capacity.resource_plan` (the `provider-worker` workload
# profile) by `Prodbox.Lib.ChartPlatform` into `.Values.resources.providerWorker`,
# exactly like the gateway and broker charts — the capacity plan is the single
# source of truth, so no chart-local default is kept here.

# The mounted provider-worker Dhall (runtime role `provider-worker`). The empty
# default lets generic lint/template invocations omit the ConfigMap body; the
# supported ChartPlatform render always supplies it.
config:
  roleDhall: ""
