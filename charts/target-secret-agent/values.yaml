global:
  namespace: target-secret-agent
  rootChart: target-secret-agent

podAnnotations: {}

image:
  # The single union runtime image (also used by the gateway, broker, and
  # api/websocket workloads). The target-secret-agent role is selected by this
  # chart's container `args:` (`target-secret-agent start …`), so the physically
  # separate agent Pod shares the image but never the identity, config mount, or
  # failure domain of any other workload.
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static Target Secret Agent chart identities — the Pod ServiceAccount, the
# Vault Kubernetes-auth role, and the constant-time lifecycle probe paths —
# generated from the one compiled
# `Prodbox.Lifecycle.TargetSecretAgent.ChartStatics` source of truth. The
# ServiceAccount name equals the Vault role (`VaultRoleTargetSecretAgent`) so
# the Pod authenticates to Vault Kubernetes auth as its own least-privilege
# identity, and the probe paths are constant-time string constants (the agreed
# Sprint 3.26 simplification) so a kubelet probe stays a fixed, capability-free
# path. This block is regenerated by `prodbox docs generate`; do not hand-edit
# it.
# prodbox:target-secret-agent-chart-statics.values:start
serviceAccount:
  name: prodbox-target-secret-agent
vault:
  role: prodbox-target-secret-agent
probes:
  liveness: /healthz
  readiness: /readyz
# prodbox:target-secret-agent-chart-statics.values:end

# Lifecycle probe timing. The agent's liveness/readiness endpoints are
# constant-time paths; deep capability observations execute through the agent's
# own client, never in a kubelet probe.
probeTiming:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1

# The agent listen port is deployment configuration, deliberately NOT a
# compiled static: the agent binds an in-cluster Service whose port the operator
# chooses per cluster.
listener:
  port: 8600

# The Guaranteed-QoS resource envelope (request == limit) is injected at render
# time from the typed `capacity.resource_plan` (the `target-secret-agent`
# workload profile) by `Prodbox.Lib.ChartPlatform` into
# `.Values.resources.targetSecretAgent`, exactly like the gateway and broker
# charts — the capacity plan is the single source of truth, so no chart-local
# default is kept here. Control-plane demand therefore never hides behind a
# combined envelope (resource_scaling_doctrine.md § 2E).

# The mounted role Dhall (runtime role `target-secret-agent`, mounted at
# /etc/target-secret-agent/config). The empty default lets generic lint/template
# invocations omit the ConfigMap body; the supported ChartPlatform render always
# supplies it.
config:
  roleDhall: ""
