{{- /*
Sprint 4.31: MinIO root credentials. Non-data-bound (MinIO reads them from env
at startup, not from the data dir), so they follow the chart-generated
`lookup`-guarded pattern: an existing `minio` Secret's values are reused on
reconcile so the root password does not rotate (and the pod does not restart)
on every `helm upgrade`. `readMinioRootCredentials` (host CLI) reads the
`rootUser` / `rootPassword` keys of this Secret for admin / IAM / Harbor-bucket
bootstrap; the gateway daemon uses its own `prodbox-gateway` IAM principal, not
these root credentials.
*/ -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "minio" -}}
{{- $rootUser := "prodbox-minio-root" -}}
{{- $rootPassword := randAlphaNum 40 -}}
{{- if and $existing $existing.data -}}
{{- if index $existing.data "rootUser" -}}
{{- $rootUser = index $existing.data "rootUser" | b64dec -}}
{{- end -}}
{{- if index $existing.data "rootPassword" -}}
{{- $rootPassword = index $existing.data "rootPassword" | b64dec -}}
{{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: minio
  labels:
    {{- include "minio.labels" . | nindent 4 }}
type: Opaque
stringData:
  rootUser: {{ $rootUser | quote }}
  rootPassword: {{ $rootPassword | quote }}
