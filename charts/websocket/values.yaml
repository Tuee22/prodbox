global:
  namespace: default
  rootChart: websocket

replicaCount: 2

podAntiAffinity:
  enabled: true

podAnnotations: {}

image:
  repository: 127.0.0.1:30080/prodbox/prodbox-public-edge-workload
  tag: latest

gateway:
  name: public-edge
  namespace: vscode
  listenerName: https
  host: test.resolvefintech.com
  oidcPathPrefix: /ws/oidc

jwt:
  securityPolicyName: websocket-jwt
  providerName: keycloak
  issuer: https://test.resolvefintech.com/auth/realms/prodbox
  audience: prodbox-websocket
  jwksUri: http://keycloak.vscode.svc.cluster.local:8080/auth/realms/prodbox/protocol/openid-connect/certs
  jwksBackend:
    namespace: vscode
    serviceName: keycloak
    servicePort: 8080
    referenceGrantName: websocket-keycloak-jwks
  routeClaimName: prodbox_route
  routeClaimValue: websocket

oidc:
  issuer: https://test.resolvefintech.com/auth/realms/prodbox
  tokenEndpoint: http://keycloak.vscode.svc.cluster.local:8080/auth/realms/prodbox/protocol/openid-connect/token
  clientId: prodbox-websocket
  clientSecret: change-me
  publicBaseUrl: https://test.resolvefintech.com/ws

redis:
  host: redis
  port: 6379

websocket:
  port: 8080
  path: /ws
