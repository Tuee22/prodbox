global:
  namespace: default
  rootChart: keycloak

cluster:
  name: prodbox-keycloak-pg
  instances: 3
  crVersion: "2.9.0"

image:
  postgres:
    repository: 127.0.0.1:30080/prodbox/percona-distribution-postgresql-mirror
    tag: "17.9-1"
  pgBouncer:
    repository: 127.0.0.1:30080/prodbox/percona-pgbouncer-mirror
    tag: "1.25.1-1"
  pgBackRest:
    repository: 127.0.0.1:30080/prodbox/percona-pgbackrest-mirror
    tag: "2.58.0-1"

postgres:
  version: 17
  database: keycloak
  username: keycloak

secrets:
  application:
    name: prodbox-keycloak-pg-pguser-keycloak
    username: keycloak
  superuser:
    name: prodbox-keycloak-pg-pguser-postgres
    username: postgres
  standby:
    name: prodbox-keycloak-pg-primaryuser
    username: primaryuser

vault:
  address: http://vault.vault.svc.cluster.local:8200
  authPath: kubernetes
  role: keycloak-keycloak-postgres-pg
  serviceAccountTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  image:
    repository: hashicorp/vault
    tag: "1.18.3"
    pullPolicy: IfNotPresent
  paths:
    application: keycloak/keycloak-postgres/patroni/app
    superuser: keycloak/keycloak-postgres/patroni/superuser
    standby: keycloak/keycloak-postgres/patroni/standby

secretMaterializer:
  serviceAccountName: prodbox-keycloak-pg
  image:
    repository: 127.0.0.1:30080/prodbox/curl-mirror
    tag: "8.11.0"
    pullPolicy: IfNotPresent

storage:
  className: manual
  size: 20Gi

security:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

proxy:
  pgBouncerReplicas: 0

backups:
  enabled: false

podAntiAffinity:
  enabled: true
