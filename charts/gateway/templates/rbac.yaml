{{- /*
Sprint 3.19: the gateway daemon no longer writes cross-namespace
Kubernetes Secrets. This template keeps only the namespace bootstrap
surface for workload namespaces that must exist before dependent chart
stacks run. A Namespace apply is idempotent, and the keep policy preserves
workload namespaces across gateway uninstall.
*/ -}}
{{- range $.Values.rbac.targetNamespaces }}
{{- if ne . $.Values.global.namespace }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ . }}
  labels:
    app.kubernetes.io/managed-by: Helm
    prodbox.io/created-by: gateway-chart-rbac-bootstrap
  annotations:
    meta.helm.sh/release-name: {{ $.Release.Name | quote }}
    meta.helm.sh/release-namespace: {{ $.Release.Namespace | quote }}
    helm.sh/resource-policy: keep
{{- end }}
{{- end }}
---
{{- /*
Sprint 3.26: the per-emitter StatefulSet's single-writer journal actor fences on
a current Kubernetes Lease incarnation. The gateway ServiceAccount is granted
exactly the `coordination.k8s.io` Lease verbs the emitter-persistence contract
declares (`.Values.emitterPersistence.lease`) — namespace-scoped, no cluster
role, no other resource. The legacy Model-B emitter does not exercise it.
*/ -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gateway-emitter-lease
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - coordination.k8s.io
    resources:
      - {{ .Values.emitterPersistence.lease.resource }}
    verbs:
      {{- range .Values.emitterPersistence.lease.verbs }}
      - {{ . }}
      {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gateway-emitter-lease
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gateway-emitter-lease
subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.global.namespace }}
