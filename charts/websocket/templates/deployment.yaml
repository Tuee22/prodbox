apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: websocket
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "websocket.labels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 30
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: websocket
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: websocket
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: Always
          args: ["workload", "start"]
          env:
            - name: PRODBOX_WORKLOAD_MODE
              value: websocket
            - name: PRODBOX_HTTP_PORT
              value: {{ .Values.websocket.port | quote }}
            - name: PRODBOX_REDIS_HOST
              value: {{ .Values.redis.host | quote }}
            - name: PRODBOX_REDIS_PORT
              value: {{ .Values.redis.port | quote }}
            - name: PRODBOX_OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: PRODBOX_OIDC_CLIENT_ID
              value: {{ .Values.oidc.clientId | quote }}
            - name: PRODBOX_OIDC_CLIENT_SECRET
              value: {{ .Values.oidc.clientSecret | quote }}
            - name: PRODBOX_OIDC_PUBLIC_BASE_URL
              value: {{ .Values.oidc.publicBaseUrl | quote }}
            - name: PRODBOX_OIDC_TOKEN_ENDPOINT
              value: {{ .Values.oidc.tokenEndpoint | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.websocket.port }}
          lifecycle:
            preStop:
              httpGet:
                path: /drain
                port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
