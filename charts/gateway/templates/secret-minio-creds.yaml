{{- /*
Sprint 2.19 (May 25, 2026): the gateway-minio-creds Secret is owned by
`prodbox rke2 reconcile`'s ensureGatewayMinioBootstrap step, which:
- creates the gateway namespace if absent,
- generates or reuses the prodbox-gateway-<suffix> MinIO user credentials,
- writes this Secret with the canonical Dhall fragment shape, and
- registers the same credentials with MinIO (user + IAM policy +
  attachment).
This chart template's job is to consume the reconcile-written Secret
via Helm `lookup`. For chart-only smoke installs without a live MinIO
(e.g. `helm template` or `helm install` against a fresh cluster before
reconcile), we fall through to lookup-self-then-randAlphaNum so the
chart still renders; those installs cannot reach MinIO and fall through
to the documented 503 master-seed-unavailable path documented in
`documents/engineering/secret_derivation_doctrine.md` §8.
*/}}
{{- $username := "" -}}
{{- $password := "" -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "gateway-minio-creds" -}}
{{- if and $existing $existing.data (hasKey $existing.data "minio.dhall") -}}
  {{- $dhallText := index $existing.data "minio.dhall" | b64dec -}}
  {{- range $line := splitList "\n" $dhallText -}}
    {{- if hasPrefix "{ minio_access_key = " $line -}}
      {{- $tokens := splitList "\"" $line -}}
      {{- if ge (len $tokens) 2 -}}
        {{- $username = index $tokens 1 -}}
      {{- end -}}
    {{- end -}}
    {{- if or (hasPrefix ", minio_secret_key = " $line) (hasPrefix "  , minio_secret_key = " $line) -}}
      {{- $tokens := splitList "\"" $line -}}
      {{- if ge (len $tokens) 2 -}}
        {{- $password = index $tokens 1 -}}
      {{- end -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if eq $username "" -}}
  {{- $username = printf "prodbox-gateway-%s" (randAlphaNum 8 | lower) -}}
{{- end -}}
{{- if eq $password "" -}}
  {{- $password = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-minio-creds
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  minio.dhall: |-
    { minio_access_key = {{ $username | quote }}
    , minio_secret_key = {{ $password | quote }}
    }
