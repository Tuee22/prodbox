{{- /*
Sprint 3.13 seventh chunk: Helm pre-install hook that POSTs to the
gateway daemon's `/v1/secret/ensure-namespace` endpoint so the
`keycloak-runtime` Secret (admin field derived from the master seed via
the `keycloak:<ns>:admin` context) is materialized in this release's
namespace BEFORE the chart's `secret.yaml` renders (which `lookup`s the
daemon-applied Secret instead of supplying a static placeholder).

The Job runs in this chart's namespace, calls the gateway daemon's
unsuffixed in-cluster ClusterIP at
`gateway.<gateway-namespace>.svc.cluster.local:<rest-port>`, and exits
with the daemon's response status. `--max-time 30` bounds the wait;
`--retry 5` covers transient daemon-pod readiness flaps.
*/ -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: ensure-namespace-{{ .Release.Name }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "keycloak.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ensure-namespace
          image: curlimages/curl:8.10.1
          command:
            - sh
            - -c
            - |
              set -eu
              payload='{"namespace":"{{ .Release.Namespace }}","release":"{{ .Release.Name }}"}'
              curl -fsS \
                --max-time 30 \
                --retry 5 \
                --retry-delay 2 \
                --retry-connrefused \
                -X POST \
                -H 'Content-Type: application/json' \
                -d "${payload}" \
                http://gateway.gateway.svc.cluster.local:{{ .Values.prodboxGateway.restPort }}/v1/secret/ensure-namespace
