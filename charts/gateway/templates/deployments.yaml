{{- /*
Sprint 3.26: the gateway emitters render as stable per-node StatefulSet
identities (one `gateway-<nodeId>` StatefulSet per ranked id, replicas 1), each
mounting its registered retained emitter journal from `.Values.emitterPersistence`
(home: a node-pinned hostPath; AWS: a `ReadWriteOncePod` retained-EBS
volumeClaimTemplate). A single-replica StatefulSet update deletes the old pod
before creating its replacement, so two admitted writers can never overlap for
one emitter identity. The historical file name (`deployments.yaml`) is retained
so the gateway chart-statics / lifecycle-probe lint keeps its filename anchor.
*/ -}}
{{- range $idx, $nodeId := .Values.nodes.rankedIds }}
{{- $emitter := index $.Values.emitterPersistence.nodes $idx }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gateway-{{ $nodeId }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    gateway-node: {{ $nodeId | quote }}
spec:
  replicas: 1
  serviceName: gateway-{{ $nodeId }}
  selector:
    matchLabels:
      {{- include "gateway.selectorLabels" $ | nindent 6 }}
      gateway-node: {{ $nodeId | quote }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gateway.labels" $ | nindent 8 }}
        gateway-node: {{ $nodeId | quote }}
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      {{- if $.Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "gateway.selectorLabels" $ | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: gateway
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          resources:
            {{- toYaml $.Values.resources.gateway | nindent 12 }}
          args:
            - gateway
            - start
            - --config
            - /etc/gateway/config/config.dhall
            {{- range $.Values.runtime.rtsArguments }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: rest
              containerPort: {{ $.Values.ports.rest }}
              protocol: TCP
            - name: events
              containerPort: {{ $.Values.ports.events }}
              protocol: TCP
          # Sprint 3.18: AWS / MinIO credentials and event keys are
          # SecretRef.Vault values in config.dhall. The daemon resolves them
          # directly through Vault Kubernetes auth; no Secret-mounted Dhall
          # fragments are part of the supported path.
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: ca
              mountPath: /ca
              readOnly: true
            - name: orders
              mountPath: /etc/gateway/orders.dhall
              subPath: orders.dhall
              readOnly: true
            - name: config
              # Sprint 2.21: directory-style mount (no subPath) so the
              # kubelet's atomic `..data` symlink swap on ConfigMap
              # update fires fsnotify on /etc/gateway/config/. With a
              # subPath mount the kubelet does NOT propagate ConfigMap
              # updates to the bound file, which silently breaks the
              # daemon's file-watch reload loop.
              mountPath: /etc/gateway/config
              readOnly: true
            - name: emitter-journal
              # Sprint 3.26: the registered retained emitter journal for this
              # stable identity. The single-writer journal actor owns it; the
              # legacy Model-B emitter leaves it unused.
              mountPath: {{ $.Values.emitterPersistence.journalMountPath }}
          livenessProbe:
            httpGet:
              path: {{ $.Values.probes.liveness.path | quote }}
              port: rest
              scheme: HTTP
            initialDelaySeconds: {{ $.Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ $.Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ $.Values.probes.liveness.failureThreshold }}
            successThreshold: {{ $.Values.probes.liveness.successThreshold }}
          readinessProbe:
            httpGet:
              path: {{ $.Values.probes.readiness.path | quote }}
              port: rest
              scheme: HTTP
            initialDelaySeconds: {{ $.Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ $.Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ $.Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ $.Values.probes.readiness.failureThreshold }}
            successThreshold: {{ $.Values.probes.readiness.successThreshold }}
      volumes:
        - name: tls
          secret:
            secretName: gateway-{{ $nodeId }}-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: ca
          secret:
            secretName: {{ $.Values.certManager.caSecretName }}
            items:
              - key: ca.crt
                path: ca.crt
        - name: orders
          configMap:
            name: gateway-orders
        - name: config
          configMap:
            name: gateway-config-{{ $nodeId }}
        {{- if eq $emitter.journal.kind "nodePinnedHostPath" }}
        - name: emitter-journal
          # Home substrate: a node-pinned hostPath. On the single-node home
          # cluster this pins the journal to the operator host's disk; the
          # StatefulSet identity keeps the pod on that path across restarts.
          hostPath:
            path: {{ $emitter.journal.hostPath | quote }}
            type: DirectoryOrCreate
        {{- end }}
  {{- if eq $emitter.journal.kind "retainedEbsClaim" }}
  volumeClaimTemplates:
    - metadata:
        name: emitter-journal
        labels:
          {{- include "gateway.labels" $ | nindent 10 }}
          gateway-node: {{ $nodeId | quote }}
      spec:
        # AWS substrate: a ReadWriteOncePod retained-EBS claim. The physical
        # retained PV (Retain reclaim policy, concrete EBS volume) is provisioned
        # by the harness/AWS stack, mirroring the other retained-PV workloads.
        accessModes:
          - {{ $emitter.journal.accessMode | quote }}
        storageClassName: {{ $emitter.journal.storageClassName | quote }}
        resources:
          requests:
            storage: {{ $emitter.journal.requestedStorage | quote }}
  {{- end }}
{{- end }}
