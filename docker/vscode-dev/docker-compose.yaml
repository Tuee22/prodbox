name: vscode-dev

# ⚠️ ========================================================================
# ⚠️ DEVELOPMENT ENVIRONMENT ONLY - DO NOT USE IN PRODUCTION
# ⚠️ ========================================================================
# This docker-compose.yaml is configured for LOCAL DEVELOPMENT ONLY.
#
# Production deployments MUST:
#   1. Use TLS (HTTPS) and set the Secure flag on the session cookie
#   2. Replace vscode-dev-secret with a strong randomly-generated client secret
#   3. Replace the admin/admin Keycloak seed user with a proper account
#   4. Use Docker secrets for POSTGRES_PASSWORD rather than plain text
# ⚠️ ========================================================================

services:

  nginx:
    container_name: vscode-dev-nginx
    build:
      context: ../..
      dockerfile: docker/nginx-oidc.Dockerfile
    ports:
      - target: 80
        published: 80
        protocol: tcp
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/oidc.js:/etc/nginx/njs/oidc.js:ro
    environment:
      - KEYCLOAK_INTERNAL_URL=http://keycloak:8080
      - KEYCLOAK_BROWSER_URL=http://localhost
      - KEYCLOAK_REALM=prodbox
      - OIDC_CLIENT_ID=vscode-nginx
      - OIDC_CLIENT_SECRET=vscode-dev-secret
      - OIDC_REDIRECT_URI=http://localhost/auth/callback
    depends_on:
      code-server:
        condition: service_started
      keycloak:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - vscode-dev-network

  code-server:
    container_name: vscode-dev-code-server
    image: codercom/code-server:4.98.2
    command: ["--auth", "none", "--bind-addr", "0.0.0.0:8080", "/workspace"]
    volumes:
      - vscode-dev-workspace:/workspace
    restart: unless-stopped
    networks:
      - vscode-dev-network

  keycloak:
    container_name: vscode-dev-keycloak
    image: quay.io/keycloak/keycloak:26.0.0
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_RELATIVE_PATH: /auth
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm.json:ro
      - ./keycloak/healthcheck.sh:/opt/keycloak/healthcheck.sh:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash /opt/keycloak/healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped
    networks:
      - vscode-dev-network

  keycloak-postgres:
    container_name: vscode-dev-keycloak-postgres
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      # ⚠️ DEV ONLY: Weak password - PRODUCTION must use Docker secrets
      POSTGRES_PASSWORD: keycloak
    volumes:
      - vscode-dev-keycloak-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - vscode-dev-network

networks:
  vscode-dev-network:
    driver: bridge
    name: vscode-dev-network

volumes:
  vscode-dev-workspace:
    driver: local
  vscode-dev-keycloak-pgdata:
    driver: local
