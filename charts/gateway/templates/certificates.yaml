{{- if .Values.certManager.enabled -}}
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.certManager.caIssuerName }}-bootstrap
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.certManager.caCertificateName }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  isCA: true
  commonName: {{ .Values.certManager.caCommonName }}
  secretName: {{ .Values.certManager.caSecretName }}
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: {{ .Values.certManager.caIssuerName }}-bootstrap
    kind: Issuer
    group: cert-manager.io
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Values.certManager.caIssuerName }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  ca:
    secretName: {{ .Values.certManager.caSecretName }}
{{- range $idx, $nodeId := .Values.nodes.rankedIds }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: gateway-{{ $nodeId }}-cert
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    gateway-node: {{ $nodeId | quote }}
spec:
  secretName: gateway-{{ $nodeId }}-tls
  duration: 8760h
  renewBefore: 720h
  subject:
    organizations:
      - prodbox-gateway
  commonName: {{ $nodeId | quote }}
  dnsNames:
    - {{ $nodeId | quote }}
    - gateway-{{ $nodeId }}
    - gateway-{{ $nodeId }}.{{ $.Release.Namespace }}.svc.cluster.local
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
    - digital signature
    - key encipherment
  issuerRef:
    name: {{ $.Values.certManager.caIssuerName }}
    kind: Issuer
    group: cert-manager.io
{{- end }}
{{- end }}
