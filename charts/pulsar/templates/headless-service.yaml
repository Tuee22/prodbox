apiVersion: v1
kind: Service
metadata:
  name: pulsar-headless
  labels:
    {{- include "pulsar.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "pulsar.selectorLabels" . | nindent 4 }}
  ports:
    - name: broker
      port: {{ .Values.pulsar.brokerPort }}
      targetPort: broker
    - name: http
      port: {{ .Values.pulsar.httpPort }}
      targetPort: http
