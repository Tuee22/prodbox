{{- /*
ServiceAccount the Authority Backup Adapter Pod runs as. It is the
Kubernetes-auth identity for the least-privilege Vault role
(`VaultRoleAuthorityBackup`), which reads ONLY
`secret/aws/authority-backup-store` and is distinct from every other
control-plane role. The name is `.Values`-driven from the compiled
Prodbox.Lifecycle.AuthorityBackup.ChartStatics so it can never drift from the
compiled identity.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "authority-backup.labels" . | nindent 4 }}
