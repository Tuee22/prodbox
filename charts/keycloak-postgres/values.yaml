global:
  namespace: default
  rootChart: keycloak-postgres

replicaCount: 1

image:
  repository: postgres
  tag: "16.4"

postgres:
  database: keycloak
  username: keycloak
  password: change-me

persistence:
  existingClaim: keycloak-postgres-data-0
  size: 20Gi

podAntiAffinity:
  enabled: true
