global:
  namespace: default
  rootChart: vscode

replicaCount: 1

podAntiAffinity:
  enabled: true

gateway:
  className: prodbox-public-edge
  name: public-edge
  listenerName: vscode-https
  tlsSecretName: public-edge-tls
  clusterIssuer: letsencrypt-http01
  host: vscode.example.com

oidc:
  clientId: vscode
  clientSecret: change-me
  issuer: https://auth.example.com/realms/prodbox
  redirectURL: https://vscode.example.com/oauth2/callback
  logoutPath: /logout
  securityPolicyName: vscode-oidc

vscode:
  image: 127.0.0.1:30080/prodbox/code-server-mirror:4.98.2
  existingClaim: vscode-data-0
