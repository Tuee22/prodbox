apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: websocket-isolation
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: websocket
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: envoy-gateway-system
      ports:
        - protocol: TCP
          port: {{ .Values.websocket.port }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: redis
      ports:
        - protocol: TCP
          port: {{ .Values.redis.port }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vscode
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 8080
    # The websocket workload resolves its OIDC client_secret SecretRef.Vault
    # via Vault Kubernetes auth at startup (role websocket-oidc); without this
    # egress the auth login times out and the pod crash-loops. Mirrors the
    # vscode chart's vault egress rule.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prodbox-vault
      ports:
        - protocol: TCP
          port: 8200
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
