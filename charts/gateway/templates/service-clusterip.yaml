{{- /*
Unified in-cluster ClusterIP Service for the gateway daemon. It routes to
any gateway pod (the selector intentionally omits the `gateway-node` label)
for status and daemon-local HTTP calls.

The per-node `gateway-<nodeId>` Services in `headless-service.yaml`
remain for stable per-pod DNS (used by the peer-gossip event channel).
The NodePort in `service-nodeport.yaml` remains for host-CLI access on
the operator host.
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "gateway.selectorLabels" . | nindent 4 }}
  ports:
    - name: rest
      port: {{ .Values.ports.rest }}
      targetPort: rest
      protocol: TCP
