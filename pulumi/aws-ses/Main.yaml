config:
  # ID of the operator-owned parent Route 53 hosted zone (from
  # `route53.zone_id` in `prodbox-config.dhall`). MX records for the receive
  # subdomain are inserted into this parent zone.
  parentZoneId:
    type: string
  # The configured sending domain (e.g. `test.resolvefintech.com`). Sourced from
  # `ses.sender_domain` in `prodbox-config.dhall`. SES domain identity is
  # provisioned for this domain.
  senderDomain:
    type: string
  # Fully-qualified receive subdomain (e.g. `inbox.test.resolvefintech.com`)
  # sourced from `ses.receive_subdomain` in `prodbox-config.dhall`. SES routes
  # mail addressed to this subdomain into the S3 capture bucket.
  receiveSubdomain:
    type: string
  # Name of the S3 bucket that captures inbound mail for the receive
  # subdomain. Sourced from `ses.capture_bucket` in `prodbox-config.dhall`.
  captureBucket:
    type: string

variables:
  stackName: ${pulumi.stack}
  receiveRuleSetName: prodbox-receive-rule-set
  receiveRuleName: prodbox-capture-all-mail
  smtpUserName: prodbox-ses-smtp
  s3KeyPrefix: inbound/

resources:
  awsProvider:
    type: pulumi:providers:aws
    defaultProvider: true
    options:
      envVarMappings:
        PRODBOX_PULUMI_AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
        PRODBOX_PULUMI_AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
        PRODBOX_PULUMI_AWS_SESSION_TOKEN: AWS_SESSION_TOKEN
        PRODBOX_PULUMI_AWS_REGION: AWS_REGION
        PRODBOX_PULUMI_AWS_DEFAULT_REGION: AWS_DEFAULT_REGION

  # S3 bucket capturing inbound mail. The `ValidationKeycloakInvite`
  # canonical-suite validation (Phase 8) polls this bucket for invite emails.
  captureBucketResource:
    type: aws:s3:Bucket
    properties:
      bucket: ${captureBucket}
      tags:
        Name: ${stackName}
        prodbox.io/substrate: shared
        prodbox.io/purpose: ses-capture

  # Allow the SES service to write inbound mail objects into the capture
  # bucket. Required by the active receive rule's S3 action.
  captureBucketPolicy:
    type: aws:s3:BucketPolicy
    properties:
      bucket: ${captureBucketResource.id}
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Sid: AllowSESPuts
              Effect: Allow
              Principal:
                Service: ses.amazonaws.com
              Action: s3:PutObject
              Resource: arn:aws:s3:::${captureBucket}/*

  # SES domain identity for the configured sending domain. The operator-owned
  # parent Route 53 zone receives the DKIM CNAME records that prove ownership.
  sendingIdentity:
    type: aws:ses:DomainIdentity
    properties:
      domain: ${senderDomain}

  sendingIdentityDkim:
    type: aws:ses:DomainDkim
    properties:
      domain: ${sendingIdentity.domain}

  # MX record on the receive subdomain pointing at the regional SES inbound
  # endpoint. Without this record SES does not accept mail for the subdomain.
  receiveSubdomainMx:
    type: aws:route53:Record
    properties:
      zoneId: ${parentZoneId}
      name: ${receiveSubdomain}
      type: MX
      ttl: 300
      records:
        - 10 inbound-smtp.${aws:region}.amazonaws.com

  # Receive rule set holding the capture rule. Activated via the active
  # rule-set resource below.
  receiveRuleSet:
    type: aws:ses:ReceiptRuleSet
    properties:
      ruleSetName: ${receiveRuleSetName}

  # Single rule that captures every message delivered to the receive
  # subdomain into the S3 bucket under the configured key prefix.
  receiveRule:
    type: aws:ses:ReceiptRule
    properties:
      name: ${receiveRuleName}
      ruleSetName: ${receiveRuleSet.ruleSetName}
      recipients:
        - ${receiveSubdomain}
      enabled: true
      scanEnabled: true
      tlsPolicy: Optional
      s3Actions:
        - position: 1
          bucketName: ${captureBucketResource.bucket}
          objectKeyPrefix: ${s3KeyPrefix}
    options:
      dependsOn:
        - ${captureBucketPolicy}

  # Mark the receive rule set as the active set for the account. SES allows
  # exactly one active rule set per account at a time.
  receiveActiveRuleSet:
    type: aws:ses:ActiveReceiptRuleSet
    properties:
      ruleSetName: ${receiveRuleSet.ruleSetName}

  # IAM user whose long-lived access key is used to derive SMTP credentials
  # via the SES IAM-to-SMTP credentials algorithm. The Keycloak chart consumes
  # the derived SMTP password from a K8s secret rendered by the prodbox chart
  # platform.
  smtpUser:
    type: aws:iam:User
    properties:
      name: ${smtpUserName}
      tags:
        Name: ${stackName}
        prodbox.io/substrate: shared
        prodbox.io/purpose: ses-smtp

  # Policy granting the SMTP user `ses:SendRawEmail` (the action SMTP-derived
  # credentials are authorized against) and the runner's read/delete
  # permission for the capture bucket.
  smtpUserPolicy:
    type: aws:iam:UserPolicy
    properties:
      user: ${smtpUser.name}
      name: prodbox-ses-smtp-policy
      policy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Sid: SendRawEmail
              Effect: Allow
              Action:
                - ses:SendRawEmail
                - ses:SendEmail
              Resource: "*"
            - Sid: CaptureBucketRead
              Effect: Allow
              Action:
                - s3:ListBucket
              Resource: arn:aws:s3:::${captureBucket}
            - Sid: CaptureBucketObjects
              Effect: Allow
              Action:
                - s3:GetObject
                - s3:DeleteObject
              Resource: arn:aws:s3:::${captureBucket}/*

  smtpUserAccessKey:
    type: aws:iam:AccessKey
    properties:
      user: ${smtpUser.name}

outputs:
  backend_bucket: prodbox-test-pulumi-backends
  sending_domain: ${sendingIdentity.domain}
  sending_identity_verification_token: ${sendingIdentity.verificationToken}
  dkim_tokens: ${sendingIdentityDkim.dkimTokens}
  receive_subdomain: ${receiveSubdomain}
  receive_subdomain_mx_fqdn: ${receiveSubdomainMx.fqdn}
  receive_rule_set_name: ${receiveRuleSet.ruleSetName}
  receive_rule_name: ${receiveRule.name}
  capture_bucket_name: ${captureBucketResource.bucket}
  capture_bucket_arn: ${captureBucketResource.arn}
  capture_bucket_key_prefix: ${s3KeyPrefix}
  smtp_iam_user_name: ${smtpUser.name}
  smtp_iam_user_arn: ${smtpUser.arn}
  smtp_iam_access_key_id: ${smtpUserAccessKey.id}
  smtp_iam_secret_access_key: ${smtpUserAccessKey.secret}
  smtp_endpoint: email-smtp.${aws:region}.amazonaws.com
