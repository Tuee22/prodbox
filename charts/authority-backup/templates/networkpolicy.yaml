{{- /*
Isolation policy for the Authority Backup Adapter. Egress is limited to what the
adapter actually needs — DNS, the Vault API (least-privilege Kubernetes-auth
login + reading ONLY `secret/aws/authority-backup-store`), and external HTTPS to
AWS S3 (backing up authority envelope/blob state to its S3 prefix). The adapter
has NO mesh, target-secret, generic-KV, Pulumi, or SES egress. Ingress is
restricted to its own namespace; kubelet liveness/readiness probes are node-local
and unaffected.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: authority-backup-isolation
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "authority-backup.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prodbox-authority-backup
      app.kubernetes.io/instance: {{ .Release.Name }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.global.namespace }}
      ports:
        - protocol: TCP
          port: authority
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: vault
          podSelector:
            matchLabels:
              app.kubernetes.io/name: prodbox-vault
      ports:
        - protocol: TCP
          port: 8200
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
