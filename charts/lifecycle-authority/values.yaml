global:
  namespace: lifecycle-authority
  rootChart: lifecycle-authority

podAnnotations: {}

image:
  # The single union runtime image (also used by the gateway and api/websocket
  # workloads). The lifecycle-authority role is selected by this chart's
  # container `args:` (`lifecycle-authority start …`), so the physically
  # separate authority Pod shares the image but never the identity, config
  # mount, retained journal, or failure domain of the Gateway Runtime.
  repository: 127.0.0.1:30080/prodbox/prodbox-runtime
  tag: latest
  pullPolicy: Always

# Generated by the supported ChartPlatform render from the validated
# RuntimeMemoryPlan. Keep this default value-free: no chart-local heap cap is
# authoritative.
runtime:
  rtsArguments: []

# Static Lifecycle Authority chart identities — the Pod ServiceAccount, the
# least-privilege Vault Kubernetes-auth role, and the constant-time lifecycle
# probe paths — generated from the one compiled
# `Prodbox.Lifecycle.Authority.ChartStatics` source of truth. The ServiceAccount
# name equals the Vault role (`VaultRoleLifecycleAuthority`) so the Pod
# authenticates to Vault Kubernetes auth as its own least-privilege identity, and
# the probe paths are constant-time strings the authority always serves. This
# block is regenerated by `prodbox docs generate`; do not hand-edit it.
# prodbox:lifecycle-authority-chart-statics.values:start
serviceAccount:
  name: prodbox-lifecycle-authority
vault:
  role: prodbox-lifecycle-authority
probes:
  liveness: /healthz
  readiness: /readyz
# prodbox:lifecycle-authority-chart-statics.values:end

# Lifecycle probe timing. The authority's liveness/readiness endpoints are
# constant-time route projections; deep capability observations execute through
# the authority's own client, never in a kubelet probe.
probeTiming:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
  readiness:
    initialDelaySeconds: 3
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 6
    successThreshold: 1

# The Lifecycle Authority listen port. The authority binds an in-cluster Service
# whose port is deployment configuration.
listener:
  port: 8600

# The retained operation-journal PersistentVolume the single-replica StatefulSet
# mounts at /var/lib/prodbox/lifecycle-authority-journal. The physical retained
# PV (Retain reclaim policy) is provisioned by the harness under this storage
# class, mirroring the gateway emitter journal.
journal:
  storageClassName: prodbox-retained

# The Guaranteed-QoS resource envelope (request == limit) is injected at render
# time from the typed `capacity.resource_plan` (the `lifecycle-authority`
# workload profile) by `Prodbox.Lib.ChartPlatform` into
# `.Values.resources.lifecycleAuthority`, exactly like the gateway and broker
# charts — the capacity plan is the single source of truth, so no chart-local
# default is kept here.

# The mounted authority Dhall (runtime role `lifecycle-authority`, mounted at
# /etc/lifecycle-authority/config). The empty default lets generic lint/template
# invocations omit the ConfigMap body; the supported ChartPlatform render always
# supplies it.
config:
  roleDhall: ""
