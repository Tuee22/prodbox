{{- /*
ServiceAccount the gateway daemon Pod runs as. It is the Kubernetes-auth
identity for Vault-backed gateway credentials and event keys.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
