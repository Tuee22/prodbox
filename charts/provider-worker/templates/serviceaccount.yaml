{{- /*
ServiceAccount the Provider Worker Pod runs as. It is the Kubernetes-auth
identity for the fenced least-privilege Vault role (`VaultRoleProviderWorker`),
which reads only `secret/aws/lifecycle-provider` and is distinct from every other
control-plane role. The name is `.Values`-driven from the compiled
Prodbox.Lifecycle.ProviderWorker.ChartStatics so it can never drift from the
compiled identity.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "provider-worker.labels" . | nindent 4 }}
