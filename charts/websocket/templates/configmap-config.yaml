{{- /*
Sprint 3.14 (May 24, 2026): the websocket workload Pod's config is rendered
as a Dhall expression (`config.dhall`) per
@documents/engineering/config_doctrine.md §6@. The workload binary decodes
this file in-process via the native Haskell `dhall` library through
`Prodbox.Workload.Settings.loadWorkloadConfig`.

Sprint 3.15: this mounted Dhall config is the SOLE config source for the
workload binary. The `PRODBOX_*` env-var fallback ladder was deleted from
`Prodbox.Workload`, so no rollback-safety env vars are set on the Pod;
`--config` is the only source. The ConfigMap is mounted as a directory (no
`subPath`) so a `log_level` / Redis / OIDC edit reloads in-process via
fsnotify, while a `mode` / `port` edit drains-and-exits for a kubelet restart
(Boot/Live split, config_doctrine §8).

Sprint 3.18: the OIDC `client_secret` is a SecretRef.Vault Dhall value.
The workload authenticates to Vault through Kubernetes auth as the
`websocket` ServiceAccount and reads `secret/data/vscode/oidc/prodbox-websocket`;
sealed, unreachable, denied, or missing Vault fails the WebSocket runtime
closed instead of falling back to a chart-rendered value.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: websocket-config
  labels:
    {{- include "websocket.labels" . | nindent 4 }}
data:
  config.dhall: |-
    { schemaVersion = 1
    , mode = < Api | Websocket >.Websocket
    , log_level = None Text
    , workload_port = Some {{ .Values.websocket.port }}
    , vault =
        Some
          { address = {{ .Values.vault.address | quote }}
          , auth_path = {{ .Values.vault.authPath | quote }}
          , role = {{ .Values.vault.role | quote }}
          , service_account_token_file = Some {{ .Values.vault.serviceAccountTokenFile | quote }}
          }
    , redis =
        Some
          { host = {{ .Values.redis.host | quote }}
          , port = {{ .Values.redis.port | quote }}
          }
    , oidc =
        Some
          { issuer = {{ .Values.oidc.issuer | quote }}
          , client_id = {{ .Values.oidc.clientId | quote }}
          , client_secret =
              < Vault : { mount : Text, path : Text, field : Text }
              | TransitKey : Text
              | Prompt : { name : Text, purpose : Text }
              | TestPlaintext : Text
              >.Vault
                { mount = {{ .Values.oidc.clientSecretVaultRef.mount | quote }}
                , path = {{ .Values.oidc.clientSecretVaultRef.path | quote }}
                , field = {{ .Values.oidc.clientSecretVaultRef.field | quote }}
                }
          , public_base_url = {{ .Values.oidc.publicBaseUrl | quote }}
          , token_endpoint = {{ .Values.oidc.tokenEndpoint | quote }}
          }
    }
