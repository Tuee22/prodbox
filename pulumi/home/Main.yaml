config:
  prodboxId:
    type: string
  awsRegion:
    type: string
    default: us-east-1
  awsAccessKeyId:
    type: string
    secret: true
  awsSecretAccessKey:
    type: string
    secret: true
  metallbPool:
    type: string
  ingressLbIp:
    type: string
  demoFqdn:
    type: string
  demoTtl:
    type: number
    default: 60
  route53ZoneId:
    type: string
  acmeServer:
    type: string
    default: "https://acme-staging-v02.api.letsencrypt.org/directory"
  acmeEmail:
    type: string
  enableDnsBootstrap:
    type: boolean
    default: true
  dnsBootstrapIp:
    type: string

variables:
  prodboxLabelValue:
    fn::invoke:
      function: std:substr
      arguments:
        input: ${prodboxId}
        offset: 0
        length: 63
      return: result

resources:
  awsProvider:
    type: pulumi:providers:aws
    properties:
      region: ${awsRegion}

  # Phase 1: MetalLB - LoadBalancer IP assignment
  metallbNamespace:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: metallb-system
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}

  metallbRelease:
    type: kubernetes:helm.sh/v3:Release
    properties:
      name: metallb
      chart: metallb
      version: "0.14.9"
      namespace: metallb-system
      repositoryOpts:
        repo: https://metallb.github.io/metallb
      skipAwait: false
      values:
        controller:
          image:
            repository: 127.0.0.1:30080/prodbox/metallb-controller-mirror
            tag: v0.14.9
        speaker:
          image:
            repository: 127.0.0.1:30080/prodbox/metallb-speaker-mirror
            tag: v0.14.9
          frr:
            image:
              repository: 127.0.0.1:30080/prodbox/frr-mirror
              tag: 9.1.0
        commonLabels:
          prodbox.io/id: ${prodboxLabelValue}
        commonAnnotations:
          prodbox.io/id: ${prodboxId}
    options:
      dependsOn:
        - ${metallbNamespace}

  # Phase 2: Traefik Ingress Controller
  traefikNamespace:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: traefik-system
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}

  traefikRelease:
    type: kubernetes:helm.sh/v3:Release
    properties:
      name: traefik
      chart: traefik
      version: "32.0.0"
      namespace: traefik-system
      repositoryOpts:
        repo: https://traefik.github.io/charts
      skipAwait: true
      values:
        image:
          registry: 127.0.0.1:30080
          repository: prodbox/traefik-mirror
          tag: v3.1.4
        service:
          type: LoadBalancer
          spec:
            loadBalancerIP: ${ingressLbIp}
        ports:
          web:
            expose:
              default: true
          websecure:
            expose:
              default: true
        ingressClass:
          name: traefik
          isDefaultClass: false
        logs:
          access:
            enabled: true
        metrics:
          prometheus:
            entryPoint: metrics
        commonLabels:
          prodbox.io/id: ${prodboxLabelValue}
        commonAnnotations:
          prodbox.io/id: ${prodboxId}
    options:
      dependsOn:
        - ${traefikNamespace}
        - ${metallbRelease}

  # Phase 3: cert-manager
  certManagerNamespace:
    type: kubernetes:core/v1:Namespace
    properties:
      metadata:
        name: cert-manager
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}

  certManagerRelease:
    type: kubernetes:helm.sh/v3:Release
    properties:
      name: cert-manager
      chart: cert-manager
      version: "v1.16.2"
      namespace: cert-manager
      repositoryOpts:
        repo: https://charts.jetstack.io
      skipAwait: false
      values:
        crds:
          enabled: true
        image:
          repository: 127.0.0.1:30080/prodbox/cert-manager-controller-mirror
          tag: v1.16.2
        webhook:
          image:
            repository: 127.0.0.1:30080/prodbox/cert-manager-webhook-mirror
            tag: v1.16.2
        cainjector:
          image:
            repository: 127.0.0.1:30080/prodbox/cert-manager-cainjector-mirror
            tag: v1.16.2
        acmesolver:
          image:
            repository: 127.0.0.1:30080/prodbox/cert-manager-acmesolver-mirror
            tag: v1.16.2
        startupapicheck:
          image:
            repository: 127.0.0.1:30080/prodbox/cert-manager-startupapicheck-mirror
            tag: v1.16.2
        global:
          leaderElection:
            namespace: cert-manager
        podLabels:
          prodbox.io/id: ${prodboxLabelValue}
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
    options:
      dependsOn:
        - ${certManagerNamespace}

  # Phase 4: Route 53 credentials secret for ClusterIssuer
  route53CredentialsSecret:
    type: kubernetes:core/v1:Secret
    properties:
      metadata:
        name: route53-credentials
        namespace: cert-manager
        annotations:
          prodbox.io/id: ${prodboxId}
        labels:
          prodbox.io/id: ${prodboxLabelValue}
      stringData:
        access-key-id: ${awsAccessKeyId}
        secret-access-key: ${awsSecretAccessKey}
    options:
      dependsOn:
        - ${certManagerNamespace}

  # Phase 6: DNS bootstrap A record (optional)
  demoARecord:
    type: aws:route53:Record
    properties:
      zoneId: ${route53ZoneId}
      name: ${demoFqdn}
      type: A
      ttl: ${demoTtl}
      records:
        - ${dnsBootstrapIp}
      allowOverwrite: true
    options:
      provider: ${awsProvider}
      ignoreChanges:
        - records

outputs:
  metallb_chart_version: "0.14.9"
  metallb_ip_pool: ${metallbPool}
  traefik_chart_version: "32.0.0"
  traefik_lb_ip: ${ingressLbIp}
  cert_manager_chart_version: "v1.16.2"
  cluster_issuer_name: letsencrypt-http01
  acme_server: ${acmeServer}
  demo_fqdn: ${demoFqdn}
  demo_ttl: ${demoTtl}
  dns_bootstrap_enabled: ${enableDnsBootstrap}
  prodbox_id: ${prodboxId}
