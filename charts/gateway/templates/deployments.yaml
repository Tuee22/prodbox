{{- range $idx, $nodeId := .Values.nodes.rankedIds }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-{{ $nodeId }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    gateway-node: {{ $nodeId | quote }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gateway.selectorLabels" $ | nindent 6 }}
      gateway-node: {{ $nodeId | quote }}
  template:
    metadata:
      {{- with $.Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "gateway.labels" $ | nindent 8 }}
        gateway-node: {{ $nodeId | quote }}
    spec:
      serviceAccountName: prodbox-gateway-daemon
      {{- if $.Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "gateway.selectorLabels" $ | nindent 20 }}
                topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: gateway
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          resources:
            {{- toYaml $.Values.resources.gateway | nindent 12 }}
          args:
            - gateway
            - start
            - --config
            - /etc/gateway/config/config.dhall
          ports:
            - name: rest
              containerPort: {{ $.Values.ports.rest }}
              protocol: TCP
            - name: events
              containerPort: {{ $.Values.ports.events }}
              protocol: TCP
          # Sprint 3.18: AWS / MinIO credentials and event keys are
          # SecretRef.Vault values in config.dhall. The daemon resolves them
          # directly through Vault Kubernetes auth; no Secret-mounted Dhall
          # fragments are part of the supported path.
          volumeMounts:
            - name: tls
              mountPath: /tls
              readOnly: true
            - name: ca
              mountPath: /ca
              readOnly: true
            - name: orders
              mountPath: /etc/gateway/orders.dhall
              subPath: orders.dhall
              readOnly: true
            - name: config
              # Sprint 2.21: directory-style mount (no subPath) so the
              # kubelet's atomic `..data` symlink swap on ConfigMap
              # update fires fsnotify on /etc/gateway/config/. With a
              # subPath mount the kubelet does NOT propagate ConfigMap
              # updates to the bound file, which silently breaks the
              # daemon's file-watch reload loop.
              mountPath: /etc/gateway/config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /v1/state
              port: rest
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /v1/state
              port: rest
              scheme: HTTP
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: tls
          secret:
            secretName: gateway-{{ $nodeId }}-tls
            items:
              - key: tls.crt
                path: tls.crt
              - key: tls.key
                path: tls.key
        - name: ca
          secret:
            secretName: {{ $.Values.certManager.caSecretName }}
            items:
              - key: ca.crt
                path: ca.crt
        - name: orders
          configMap:
            name: gateway-orders
        - name: config
          configMap:
            name: gateway-config-{{ $nodeId }}
{{- end }}
