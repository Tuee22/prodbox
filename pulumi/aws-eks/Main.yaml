config:
  operatorCidr:
    type: string

variables:
  stackName: ${pulumi.stack}
  clusterName: ${stackName}-cluster
  nodeGroupName: ${stackName}-node-group
  availabilityZones:
    fn::invoke:
      function: aws:getAvailabilityZones
      arguments:
        state: available
      return: names
  # IRSA condition keys require the OIDC issuer URL without the
  # `https://` scheme (per AWS IAM docs); the EKS cluster output's
  # `identities[0].oidcs[0].issuer` includes the scheme, so split on
  # "/" and rejoin from element 2 onward to strip it.
  oidcIssuerParts:
    fn::split:
      - "/"
      - ${cluster.identities[0].oidcs[0].issuer}
  oidcIssuerHostPath:
    fn::join:
      - "/"
      - - ${oidcIssuerParts[2]}
        - ${oidcIssuerParts[3]}
        - ${oidcIssuerParts[4]}

resources:
  awsProvider:
    type: pulumi:providers:aws
    defaultProvider: true
    options:
      envVarMappings:
        PRODBOX_PULUMI_AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
        PRODBOX_PULUMI_AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
        PRODBOX_PULUMI_AWS_SESSION_TOKEN: AWS_SESSION_TOKEN
        PRODBOX_PULUMI_AWS_REGION: AWS_REGION
        PRODBOX_PULUMI_AWS_DEFAULT_REGION: AWS_DEFAULT_REGION

  vpc:
    type: aws:ec2:Vpc
    properties:
      cidrBlock: "10.91.0.0/16"
      enableDnsHostnames: true
      enableDnsSupport: true
      tags:
        Name: ${stackName}-vpc

  igw:
    type: aws:ec2:InternetGateway
    properties:
      vpcId: ${vpc.id}
      tags:
        Name: ${stackName}-igw

  publicRouteTable:
    type: aws:ec2:RouteTable
    properties:
      vpcId: ${vpc.id}
      routes:
        - cidrBlock: "0.0.0.0/0"
          gatewayId: ${igw.id}
      tags:
        Name: ${stackName}-public-rt

  publicSubnet0:
    type: aws:ec2:Subnet
    properties:
      vpcId: ${vpc.id}
      cidrBlock: "10.91.0.0/24"
      availabilityZone: ${availabilityZones[0]}
      mapPublicIpOnLaunch: true
      tags:
        Name: ${stackName}-public-subnet-0
        kubernetes.io/cluster/${clusterName}: shared
        kubernetes.io/role/elb: "1"

  publicSubnet1:
    type: aws:ec2:Subnet
    properties:
      vpcId: ${vpc.id}
      cidrBlock: "10.91.1.0/24"
      availabilityZone: ${availabilityZones[1]}
      mapPublicIpOnLaunch: true
      tags:
        Name: ${stackName}-public-subnet-1
        kubernetes.io/cluster/${clusterName}: shared
        kubernetes.io/role/elb: "1"

  rta0:
    type: aws:ec2:RouteTableAssociation
    properties:
      subnetId: ${publicSubnet0.id}
      routeTableId: ${publicRouteTable.id}

  rta1:
    type: aws:ec2:RouteTableAssociation
    properties:
      subnetId: ${publicSubnet1.id}
      routeTableId: ${publicRouteTable.id}

  clusterRole:
    type: aws:iam:Role
    properties:
      assumeRolePolicy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: eks.amazonaws.com
              Action: sts:AssumeRole
      tags:
        Name: ${stackName}-cluster-role

  clusterPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${clusterRole.name}
      policyArn: "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"

  nodeRole:
    type: aws:iam:Role
    properties:
      assumeRolePolicy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action: sts:AssumeRole
      tags:
        Name: ${stackName}-node-role

  nodeWorkerPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${nodeRole.name}
      policyArn: "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"

  nodeCniPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${nodeRole.name}
      policyArn: "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"

  nodeEcrPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${nodeRole.name}
      policyArn: "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"

  cluster:
    type: aws:eks:Cluster
    properties:
      name: ${clusterName}
      roleArn: ${clusterRole.arn}
      accessConfig:
        authenticationMode: API_AND_CONFIG_MAP
        bootstrapClusterCreatorAdminPermissions: true
      vpcConfig:
        subnetIds:
          - ${publicSubnet0.id}
          - ${publicSubnet1.id}
        endpointPrivateAccess: true
        endpointPublicAccess: true
        publicAccessCidrs:
          - ${operatorCidr}
      tags:
        Name: ${clusterName}
    options:
      dependsOn:
        - ${clusterPolicyAttachment}

  nodeGroup:
    type: aws:eks:NodeGroup
    properties:
      clusterName: ${cluster.name}
      nodeGroupName: ${nodeGroupName}
      nodeRoleArn: ${nodeRole.arn}
      subnetIds:
        - ${publicSubnet0.id}
        - ${publicSubnet1.id}
      instanceTypes:
        - t3.medium
      diskSize: 20
      scalingConfig:
        desiredSize: 2
        minSize: 2
        maxSize: 2
      tags:
        Name: ${nodeGroupName}
    options:
      dependsOn:
        - ${cluster}
        - ${nodeWorkerPolicyAttachment}
        - ${nodeCniPolicyAttachment}
        - ${nodeEcrPolicyAttachment}

  # IAM OIDC provider for the EKS cluster, required for IRSA-bound service accounts
  # such as the AWS Load Balancer Controller.
  oidcProvider:
    type: aws:iam:OpenIdConnectProvider
    properties:
      url: ${cluster.identities[0].oidcs[0].issuer}
      clientIdLists:
        - sts.amazonaws.com
      # Root CA thumbprint for AWS EKS OIDC endpoints. The thumbprint covers
      # the DigiCert/Amazon-issued certificates that front the EKS OIDC service
      # in every supported region.
      thumbprintLists:
        - 9e99a48a9960b14926bb7f3b02e22da2b0ab7280
      tags:
        Name: ${stackName}-oidc-provider

  # IAM policy for the AWS Load Balancer Controller. The policy document is the
  # canonical upstream IAM policy from
  # https://github.com/kubernetes-sigs/aws-load-balancer-controller/blob/v2.8.2/docs/install/iam_policy.json
  # vendored at pulumi/aws-eks/aws-lb-controller-iam-policy.json. Keep the
  # vendored copy in sync with the controller version we install at the
  # chart-deploy boundary.
  awsLbControllerPolicy:
    type: aws:iam:Policy
    properties:
      name: ${stackName}-aws-lb-controller
      description: "AWS Load Balancer Controller permissions for the AWS-substrate EKS cluster"
      policy:
        fn::readFile: ./aws-lb-controller-iam-policy.json

  # IAM role assumed by the AWS Load Balancer Controller's Kubernetes service
  # account via web identity federation through the cluster's OIDC provider.
  # The service account name (`aws-load-balancer-controller`) and namespace
  # (`kube-system`) are the standard controller defaults.
  awsLbControllerRole:
    type: aws:iam:Role
    properties:
      name: ${stackName}-aws-lb-controller
      assumeRolePolicy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Federated: ${oidcProvider.arn}
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  ${oidcIssuerHostPath}:sub: system:serviceaccount:kube-system:aws-load-balancer-controller
                  ${oidcIssuerHostPath}:aud: sts.amazonaws.com
      tags:
        Name: ${stackName}-aws-lb-controller

  awsLbControllerPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${awsLbControllerRole.name}
      policyArn: ${awsLbControllerPolicy.arn}

  # EBS CSI driver IRSA role + managed-addon installation. The default EKS
  # cluster ships only the legacy in-tree `gp2` StorageClass without a
  # backing provisioner; PVCs against it sit Pending forever. The
  # aws-ebs-csi-driver EKS managed addon installs the modern
  # `ebs.csi.aws.com` provisioner that backs `gp2` (and `gp3`) dynamic
  # EBS volumes. The Sprint 7.5.c.i MinIO chart values use
  # `persistence.storageClass=gp2` on the AWS substrate, so the driver
  # must be available for MinIO's PVC binding to succeed.
  ebsCsiDriverRole:
    type: aws:iam:Role
    properties:
      name: ${stackName}-ebs-csi-driver
      assumeRolePolicy:
        fn::toJSON:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Federated: ${oidcProvider.arn}
              Action: sts:AssumeRoleWithWebIdentity
              Condition:
                StringEquals:
                  ${oidcIssuerHostPath}:sub: system:serviceaccount:kube-system:ebs-csi-controller-sa
                  ${oidcIssuerHostPath}:aud: sts.amazonaws.com
      tags:
        Name: ${stackName}-ebs-csi-driver

  ebsCsiDriverPolicyAttachment:
    type: aws:iam:RolePolicyAttachment
    properties:
      role: ${ebsCsiDriverRole.name}
      policyArn: "arn:aws:iam::aws:policy/service-role/AmazonEBSCSIDriverPolicy"

  ebsCsiDriverAddon:
    type: aws:eks:Addon
    properties:
      clusterName: ${cluster.name}
      addonName: aws-ebs-csi-driver
      serviceAccountRoleArn: ${ebsCsiDriverRole.arn}
      resolveConflictsOnCreate: OVERWRITE
      resolveConflictsOnUpdate: OVERWRITE
      tags:
        Name: ${stackName}-ebs-csi-driver
    options:
      dependsOn:
        - ${nodeGroup}
        - ${ebsCsiDriverPolicyAttachment}

outputs:
  backend_bucket: prodbox-test-pulumi-backends
  cluster_name: ${cluster.name}
  cluster_role_name: ${clusterRole.name}
  node_group_name: ${nodeGroup.nodeGroupName}
  node_role_name: ${nodeRole.name}
  vpc_id: ${vpc.id}
  subnet_ids:
    - ${publicSubnet0.id}
    - ${publicSubnet1.id}
  cluster_security_group_id: ${cluster.vpcConfig.clusterSecurityGroupId}
  cluster_oidc_issuer: ${cluster.identities[0].oidcs[0].issuer}
  oidc_provider_arn: ${oidcProvider.arn}
  aws_lb_controller_policy_arn: ${awsLbControllerPolicy.arn}
  aws_lb_controller_role_arn: ${awsLbControllerRole.arn}
  aws_lb_controller_role_name: ${awsLbControllerRole.name}
  ebs_csi_driver_role_arn: ${ebsCsiDriverRole.arn}
  ebs_csi_driver_addon_arn: ${ebsCsiDriverAddon.arn}
