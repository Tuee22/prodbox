# Pulumi stack configuration for the 'home' environment
# Secrets are loaded from environment variables, not stored here

config:
  # AWS region for Route 53
  aws:region: us-east-1

  # Stack-specific settings (can be overridden per-stack)
  # These values should match your network configuration
  # prodbox:metallb_pool: "192.168.1.240-192.168.1.250"
  # prodbox:ingress_lb_ip: "192.168.1.240"
  # prodbox:demo_fqdn: "demo.example.com"
