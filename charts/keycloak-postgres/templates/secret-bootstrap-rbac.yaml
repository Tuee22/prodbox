apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.secretMaterializer.serviceAccountName | quote }}
  labels:
    {{- include "keycloak-postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.secretMaterializer.serviceAccountName | quote }}
  labels:
    {{- include "keycloak-postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.secrets.application.name | quote }}
      - {{ .Values.secrets.superuser.name | quote }}
      - {{ .Values.secrets.standby.name | quote }}
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.secretMaterializer.serviceAccountName | quote }}
  labels:
    {{- include "keycloak-postgres.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-20"
    "helm.sh/hook-delete-policy": before-hook-creation
subjects:
  - kind: ServiceAccount
    name: {{ .Values.secretMaterializer.serviceAccountName | quote }}
    namespace: {{ .Release.Namespace | quote }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.secretMaterializer.serviceAccountName | quote }}
