apiVersion: apps/v1
kind: Deployment
metadata:
  name: vscode
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vscode
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "vscode.labels" . | nindent 8 }}
    spec:
      {{- if .Values.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: vscode
                  app.kubernetes.io/instance: {{ .Release.Name }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      securityContext:
        fsGroup: 1000
      containers:
        - name: vscode
          image: {{ .Values.vscode.image | quote }}
          imagePullPolicy: IfNotPresent
          args:
            - --auth
            - none
            - --bind-addr
            - 0.0.0.0:8080
            - /workspace
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ .Values.vscode.existingClaim | quote }}
