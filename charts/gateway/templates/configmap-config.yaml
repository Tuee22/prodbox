{{- /*
Sprint 2.22 (May 24, 2026): the gateway daemon's per-node config is rendered
as a Dhall expression (`config.dhall`) per
@documents/engineering/config_doctrine.md §6@. The daemon decodes this file
in-process via the native Haskell `dhall` library (Sprint 2.20).

This template keeps the existing JSON-rendering ConfigMap available alongside
the new Dhall ConfigMap during the rollout: the deployment volume mount
points at `config.dhall`, but if an operator needs to inspect the structured
config the rendered Dhall is the source of truth. Sprint 2.22 follow-up will
also rewrite `configmap-orders.yaml` to render Dhall and remove env-var-
sourced credentials from `deployments.yaml`; both depend on the daemon-side
Dhall import wiring (Sprint 2.19 closure work).
*/}}
{{- /*
Sprint 3.18: event keys, AWS credentials, and MinIO credentials are direct
SecretRef.Vault values. The gateway daemon authenticates to Vault through
Kubernetes auth as the `prodbox-gateway-daemon` ServiceAccount and resolves
these fields before constructing its runtime config; no Helm `lookup`, no
Secret-mounted Dhall fragments, and no plaintext values are rendered.
*/ -}}
{{- range $idx, $nodeId := .Values.nodes.rankedIds }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config-{{ $nodeId }}
  labels:
    {{- include "gateway.labels" $ | nindent 4 }}
    gateway-node: {{ $nodeId | quote }}
data:
{{- if $.Values.tier0.prodboxDhall }}
  # Non-secret binary context used by target-secret identity attestation. The
  # daemon loader prefers this ConfigMap sibling over the image-baked fallback.
  prodbox.dhall: |-
{{ $.Values.tier0.prodboxDhall | indent 4 }}
{{- end }}
  config.dhall: |-
    { schemaVersion = 1
    , vault =
        Some
          { address = {{ $.Values.vault.address | quote }}
          , auth_path = {{ $.Values.vault.authPath | quote }}
          , role = {{ $.Values.vault.role | quote }}
          , service_account_token_file = Some {{ $.Values.vault.serviceAccountTokenFile | quote }}
          }
    , boot =
      { node_id = {{ $nodeId | quote }}
      , cert_file = "/tls/tls.crt"
      , key_file = "/tls/tls.key"
      , ca_file = "/ca/ca.crt"
      , orders_file = "/etc/gateway/orders.dhall"
      , event_keys =
        [ { name = "node-a"
          , value =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.eventKeyNodeA "field" "key") | nindent 14 }}
          }
        , { name = "node-b"
          , value =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.eventKeyNodeB "field" "key") | nindent 14 }}
          }
        , { name = "node-c"
          , value =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.eventKeyNodeC "field" "key") | nindent 14 }}
          }
        ]
      , dns_write_gate =
          {{- if $.Values.dnsWriteGate.enabled }}
          Some
            { zone_id = {{ $.Values.dnsWriteGate.zoneId | quote }}
            , fqdn = {{ $.Values.dnsWriteGate.fqdn | quote }}
            , ttl = {{ $.Values.dnsWriteGate.ttl }}
            , aws_region = {{ $.Values.dnsWriteGate.awsRegion | quote }}
            }
          {{- else }}
          None { zone_id : Text, fqdn : Text, ttl : Natural, aws_region : Text }
          {{- end }}
      , aws_creds =
          Some
            { access_key_id =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.aws "field" "access_key_id") | nindent 16 }}
            , secret_access_key =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.aws "field" "secret_access_key") | nindent 16 }}
            , session_token =
                Some
                  (
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.aws "field" "session_token") | nindent 20 }}
                  )
            , region = {{ $.Values.dnsWriteGate.awsRegion | quote }}
            }
      , minio_creds =
          Some
            { minio_access_key =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.minio "field" "minio_access_key") | nindent 16 }}
            , minio_secret_key =
{{ include "gateway.secretRefVault" (dict "mount" "secret" "path" $.Values.vault.paths.minio "field" "minio_secret_key") | nindent 16 }}
            }
      -- In-cluster MinIO Service endpoint URL for gateway-owned object-store
      -- access. Operator-overridable via the chart value
      -- @minio.endpointUrl@; default is the home-substrate canonical
      -- Service DNS.
      , minio_endpoint_url = Some {{ $.Values.minio.endpointUrl | quote }}
      }
    , live =
      { heartbeat_interval_seconds = {{ include "gateway.dhallDouble" $.Values.timing.heartbeatIntervalSeconds }}
      , reconnect_interval_seconds = {{ include "gateway.dhallDouble" $.Values.timing.reconnectIntervalSeconds }}
      , sync_interval_seconds = {{ include "gateway.dhallDouble" $.Values.timing.syncIntervalSeconds }}
      , max_clock_skew_seconds = 10.0
      , drain_deadline_seconds = Some 30
      , log_level = Some "info"
      }
    }
{{- end }}
