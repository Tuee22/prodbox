apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-orders
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  orders.json: |-
    {
      "version_utc": 1,
      "nodes": [
        {{- $namespace := .Release.Namespace -}}
        {{- $rest := .Values.ports.rest -}}
        {{- $events := .Values.ports.events -}}
        {{- range $idx, $nodeId := .Values.nodes.rankedIds }}
        {{- if gt $idx 0 }},{{ end }}
        {
          "node_id": {{ $nodeId | quote }},
          "stable_dns_name": "gateway-{{ $nodeId }}.{{ $namespace }}.svc.cluster.local",
          "rest_host": "0.0.0.0",
          "rest_port": {{ $rest }},
          "socket_host": "0.0.0.0",
          "socket_port": {{ $events }}
        }
        {{- end }}
      ],
      "gateway_rule": {
        "ranked_nodes": [
          {{- range $idx, $nodeId := .Values.nodes.rankedIds }}
          {{- if gt $idx 0 }},{{ end }}
          {{ $nodeId | quote }}
          {{- end }}
        ],
        "heartbeat_timeout_seconds": {{ .Values.timing.heartbeatTimeoutSeconds }}
      }
    }
