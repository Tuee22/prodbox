global:
  namespace: default
  rootChart: vscode

ingress:
  host: vscode.example.com
  clusterIssuer: letsencrypt-dns01

nginx:
  image: 127.0.0.1:30080/prodbox/prodbox-nginx-oidc:latest
  clientId: vscode-nginx
  clientSecret: change-me
  realm: prodbox
  keycloakInternalUrl: http://keycloak:8080
  # CoreDNS ClusterIP — used by njs ngx.fetch for hostname resolution.
  # Default is the RKE2 cluster DNS IP. Override if different on your cluster.
  dnsResolver: "10.43.0.10"

vscode:
  image: codercom/code-server:4.98.2
  existingClaim: vscode-data-0
