global:
  namespace: gateway
  rootChart: gateway

# Sprint 3.13 sixth chunk + chunks 16/22/27: namespaces in which the
# gateway daemon's `POST /v1/secret/ensure-namespace` handler (and
# Sprint 3.13 chunk 16's startup self-bootstrap path) creates derived
# k8s Secrets. One Role + RoleBinding pair is emitted per entry so the
# daemon's ServiceAccount has `secrets:get,create,update,patch` scoped
# to only the namespaces it actually writes to (per
# `Prodbox.Secret.Inventory.derivedSecretInventoryFor`).
#
# The `gateway` entry authorizes the daemon's own startup self-bootstrap
# to write `gateway-event-keys` in its own namespace.
#
# The `keycloak` + `vscode` entries cover the two namespaces where the
# keycloak-postgres dependency deploys a Patroni cluster: keycloak chart
# directly, vscode chart transitively (vscode → keycloak →
# keycloak-postgres). Both clusters need their three Patroni-role
# Secrets materialized by the daemon's ensure-namespace handler (chunk
# 21 made the Inventory entry namespace-aware so the same handler
# writes prodbox-keycloak-pg-* or prodbox-vscode-pg-* depending on the
# request's namespace).
rbac:
  targetNamespaces:
    - keycloak
    - vscode
    - gateway

# Pod anti-affinity for HA defaults. Dev mode (suppressing anti-affinity)
# is controlled by chart_platform.py via _ha_values().
podAntiAffinity:
  enabled: true

podAnnotations: {}

image:
  # Container image for the gateway daemon. The supported `prodbox charts`
  # path overrides this with the machine-identity tag imported into local RKE2
  # containerd by `prodbox rke2 ensure`.
  repository: 127.0.0.1:30080/prodbox/prodbox-gateway
  tag: latest
  pullPolicy: Always

# REST/event ports the daemon binds inside each pod.
ports:
  rest: 8443
  events: 8444

# NodePort exposed by the gateway-nodeport Service for host-CLI access
# (127.0.0.1:<rest> per documents/engineering/secret_derivation_doctrine.md
# §5). The default matches the port the iptables rule installed by
# `prodbox host firewall gateway-restrict` restricts to loopback ingress.
nodePort:
  rest: 30443

# Daemon timing knobs. The defaults align with the in-pod test suite.
timing:
  heartbeatIntervalSeconds: 0.5
  reconnectIntervalSeconds: 0.5
  syncIntervalSeconds: 1.0
  heartbeatTimeoutSeconds: 5

# Mesh node ranking. The first entry is the preferred Route 53 writer.
# Each entry is a stable node id; the chart renders one Deployment +
# Service named `gateway-<nodeId>` per entry.
nodes:
  rankedIds:
    - node-a
    - node-b
    - node-c

# Route 53 ownership configuration. The dns_write_gate section is mounted
# into the daemon config so the elected leader keeps the named record
# pointed at the current public IP.
dnsWriteGate:
  enabled: true
  zoneId: ""
  fqdn: ""
  ttl: 60
  awsRegion: ""

# AWS credentials are mounted as environment variables on the gateway
# pod and consumed by the daemon's Route 53 client. They are intentionally
# never written to the daemon config file.
aws:
  accessKeyId: ""
  secretAccessKey: ""
  sessionToken: ""

# Sprint 2.19: in-cluster MinIO endpoint URL the daemon uses to read or
# create the master seed at prodbox/master-seed. The default points at
# the home-substrate MinIO Service; AWS-substrate deploys override this
# via `prodbox charts deploy gateway --substrate aws` (the substrate
# adapter renders the AWS-side Service DNS).
minio:
  endpointUrl: "http://minio.prodbox.svc.cluster.local:9000"

# cert-manager Issuer/Certificate material for mesh mTLS. A self-signed
# CA Issuer is created in the gateway namespace and used to mint one
# Certificate per node id with CN=<nodeId> so the daemon can validate
# peer node identity from the TLS handshake.
certManager:
  enabled: true
  caIssuerName: gateway-ca-issuer
  caCertificateName: gateway-ca
  caSecretName: gateway-ca-tls
  caCommonName: gateway-mesh-ca
