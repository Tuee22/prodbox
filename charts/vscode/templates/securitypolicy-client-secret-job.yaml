apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-client-secret" .Values.oidc.securityPolicyName | quote }}
  labels:
    {{- include "vscode.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 60
  template:
    metadata:
      labels:
        {{- include "vscode.labels" . | nindent 8 }}
        # Override the workload `name` label so this short-lived materializer
        # Job is NOT selected by the `vscode-isolation` NetworkPolicy (which
        # matches name=vscode + instance=<release> and default-denies egress to
        # everything except DNS, Vault, and 80/443 to 0.0.0.0/0). The Job needs
        # egress to the Kubernetes API ClusterIP (10.43.0.1:443, DNAT'd to the
        # apiserver's :6443) to create the OIDC client-secret Secret, which the
        # workload egress allow-list deliberately does not cover (and must not —
        # the long-running code-server stays locked down). This mirrors the
        # keycloak-postgres materializer, whose `name=keycloak-postgres` label
        # likewise exempts it from the keycloak workload isolation policy.
        app.kubernetes.io/name: vscode-oidc-client-secret
    spec:
      serviceAccountName: {{ printf "%s-secret-materializer" .Values.oidc.securityPolicyName | quote }}
      restartPolicy: OnFailure
      initContainers:
        - name: vault-secrets
          image: "{{ .Values.vault.image.repository }}:{{ .Values.vault.image.tag }}"
          imagePullPolicy: {{ .Values.vault.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources.vaultSecrets | nindent 12 }}
          env:
            - name: VAULT_ADDR
              value: {{ .Values.vault.address | quote }}
            - name: VAULT_AUTH_PATH
              value: {{ .Values.vault.authPath | quote }}
            - name: VAULT_ROLE
              value: {{ .Values.vault.role | quote }}
            - name: VAULT_SA_TOKEN_FILE
              value: {{ .Values.vault.serviceAccountTokenFile | quote }}
          command:
            - /bin/sh
            - -ec
            - |
              set -eu
              jwt="$(cat "${VAULT_SA_TOKEN_FILE}")"
              export VAULT_TOKEN="$(vault write -field=token "auth/${VAULT_AUTH_PATH}/login" role="${VAULT_ROLE}" jwt="${jwt}")"
              umask 077
              vault kv get -field=client_secret secret/{{ .Values.vault.paths.oidcVscode }} > /vault-materialized/client-secret
              # The init container writes under `umask 077` (0600, owner-only),
              # but the materialize-client-secret container runs as a DIFFERENT
              # UID and reads this file — without this it dies with
              # `/vault-materialized/client-secret: Permission denied`. Make it
              # world-readable within the pod, the same cross-container
              # materializer handoff fix as the keycloak env file and the ACME
              # EAB hmac-key (`chmod 0644 /vault-materialized/hmac-key`).
              chmod 0644 /vault-materialized/client-secret
          volumeMounts:
            - name: vault-materialized
              mountPath: /vault-materialized
      containers:
        - name: materialize-client-secret
          image: "{{ .Values.secretMaterializer.image.repository }}:{{ .Values.secretMaterializer.image.tag }}"
          imagePullPolicy: {{ .Values.secretMaterializer.image.pullPolicy }}
          resources:
            {{- toYaml .Values.resources.secretMaterializer | nindent 12 }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SECRET_NAME
              value: {{ printf "%s-client" .Values.oidc.securityPolicyName | quote }}
            - name: SERVICEACCOUNT_TOKEN_FILE
              value: /var/run/secrets/kubernetes.io/serviceaccount/token
            - name: SERVICEACCOUNT_CA_FILE
              value: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          command:
            - sh
            - -c
            - |
              set -eu

              api_server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT_HTTPS:-443}"
              token="$(cat "${SERVICEACCOUNT_TOKEN_FILE}")"
              client_secret_b64="$(base64 < /vault-materialized/client-secret | tr -d '\n')"

              cat > /tmp/secret-create.json <<EOF
              {"apiVersion":"v1","kind":"Secret","metadata":{"name":"${SECRET_NAME}","labels":{"app.kubernetes.io/name":"vscode","app.kubernetes.io/instance":"{{ .Release.Name }}","app.kubernetes.io/managed-by":"prodbox","prodbox.io/chart-root":"{{ .Values.global.rootChart }}"}},"type":"Opaque","data":{"client-secret":"${client_secret_b64}"}}
              EOF
              cat > /tmp/secret-patch.json <<EOF
              {"metadata":{"labels":{"app.kubernetes.io/name":"vscode","app.kubernetes.io/instance":"{{ .Release.Name }}","app.kubernetes.io/managed-by":"prodbox","prodbox.io/chart-root":"{{ .Values.global.rootChart }}"}},"type":"Opaque","data":{"client-secret":"${client_secret_b64}"}}
              EOF

              create_code="$(
                curl -sS \
                  --cacert "${SERVICEACCOUNT_CA_FILE}" \
                  -H "Authorization: Bearer ${token}" \
                  -H "Content-Type: application/json" \
                  -o /tmp/secret-create-response.json \
                  -w '%{http_code}' \
                  --data-binary @/tmp/secret-create.json \
                  "${api_server}/api/v1/namespaces/${POD_NAMESPACE}/secrets" \
                  || true
              )"

              case "${create_code}" in
                201)
                  exit 0
                  ;;
                409)
                  patch_code="$(
                    curl -sS \
                      --cacert "${SERVICEACCOUNT_CA_FILE}" \
                      -H "Authorization: Bearer ${token}" \
                      -H "Content-Type: application/merge-patch+json" \
                      -o /tmp/secret-patch-response.json \
                      -w '%{http_code}' \
                      --request PATCH \
                      --data-binary @/tmp/secret-patch.json \
                      "${api_server}/api/v1/namespaces/${POD_NAMESPACE}/secrets/${SECRET_NAME}" \
                      || true
                  )"
                  case "${patch_code}" in
                    200|201)
                      exit 0
                      ;;
                    *)
                      cat /tmp/secret-patch-response.json >&2
                      exit 1
                      ;;
                  esac
                  ;;
                *)
                  cat /tmp/secret-create-response.json >&2
                  exit 1
                  ;;
              esac
          volumeMounts:
            - name: vault-materialized
              mountPath: /vault-materialized
              readOnly: true
      volumes:
        - name: vault-materialized
          emptyDir:
            medium: Memory
            sizeLimit: 1Mi
