{{- /*
Sprint 3.13 sixth chunk: ServiceAccount the gateway daemon Pod runs as.
Bound to the per-target-namespace Roles in `rbac.yaml` so the daemon
can materialize derived k8s Secrets (Patroni roles, Keycloak admin,
etc.) on `POST /v1/secret/ensure-namespace` per
[Secret Derivation Doctrine §4 / §6](../../../documents/engineering/secret_derivation_doctrine.md).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prodbox-gateway-daemon
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
