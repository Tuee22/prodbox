global:
  namespace: default
  rootChart: keycloak-postgres

replicaCount: 1

image:
  repository: 127.0.0.1:30080/prodbox/postgres-mirror
  tag: "16.4-bullseye"

postgres:
  database: keycloak
  username: keycloak
  password: change-me

persistence:
  existingClaim: keycloak-postgres-data-0
  size: 20Gi

podAntiAffinity:
  enabled: true
