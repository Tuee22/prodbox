global:
  namespace: default
  rootChart: keycloak

replicaCount: 1

podAntiAffinity:
  enabled: true

image:
  repository: 127.0.0.1:30080/prodbox/keycloak-mirror
  tag: "26.0.0"

gateway:
  className: prodbox-public-edge
  name: public-edge
  listenerName: https
  httpRedirectListenerName: http
  httpRedirectRouteName: public-edge-http-redirect
  routeName: keycloak
  tlsSecretName: public-edge-tls
  # Deploy-time default; set by Prodbox.Lib.ChartPlatform.valuesForKeycloak to
  # the single ZeroSSL ClusterIssuer (Prodbox.PublicEdge.publicEdgeClusterIssuerName).
  clusterIssuer: zerossl-dns01
  host: test.resolvefintech.com
  # Deploy-time default; set by Prodbox.Lib.ChartPlatform.valuesForKeycloak to the
  # certificate dnsNames projected from the configured CertScopeSet
  # (Prodbox.Settings.certDnsNamesForServedHost / Prodbox.Tls.CertScope). Empty
  # cert_scopes yields exactly the served host, so this default matches `host`.
  certDnsNames:
    - test.resolvefintech.com
  authPathPrefix: /auth
  vscodePathPrefix: /vscode
  apiPathPrefix: /api
  websocketPathPrefix: /ws

keycloak:
  adminUser: admin
  publicHost: test.resolvefintech.com
  httpRelativePath: /auth
  realmName: prodbox
  # When true, the imported realm enforces operator-invited email verification on every
  # non-fixture user: emailVerified=false and requiredActions=["VERIFY_EMAIL"] until the
  # invited recipient follows the invite link and sets a password. The seeded
  # `oidc.demoUserName` user retains emailVerified=true so the canonical-suite OIDC
  # validations (charts-vscode, charts-api, charts-websocket) keep working against the
  # home substrate without an invite round-trip.
  requireEmailVerification: true

smtp:
  enabled: true
  port: 587

oidc:
  vscodeClientId: vscode
  redirectUri: https://test.resolvefintech.com/vscode/oauth2/callback
  adminRedirectUris:
    - https://test.resolvefintech.com/minio/oauth2/callback
  apiClientId: prodbox-api
  apiAudience: prodbox-api
  apiRouteClaimName: prodbox_route
  apiRouteClaimValue: api
  websocketClientId: prodbox-websocket
  websocketAudience: prodbox-websocket
  websocketRouteClaimName: prodbox_route
  websocketRouteClaimValue: websocket
  websocketRedirectUri: https://test.resolvefintech.com/ws/oidc/callback
  demoUserName: demo-user

postgres:
  host: prodbox-keycloak-pg-ha.default.svc.cluster.local
  database: keycloak
  username: keycloak
  passwordSecretName: prodbox-keycloak-pg-pguser-keycloak

vault:
  address: http://vault.vault.svc.cluster.local:8200
  authPath: kubernetes
  role: keycloak
  serviceAccountTokenFile: /var/run/secrets/kubernetes.io/serviceaccount/token
  image:
    repository: hashicorp/vault
    tag: "1.18.3"
    pullPolicy: IfNotPresent
  paths:
    admin: keycloak/admin
    db: keycloak/keycloak-postgres/patroni/app
    oidcVscode: keycloak/oidc/vscode
    oidcApi: keycloak/oidc/prodbox-api
    oidcWebsocket: keycloak/oidc/prodbox-websocket
    demoUser: keycloak/oidc/demo-user
    smtp: keycloak/smtp
