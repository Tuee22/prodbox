{{- /*
gateway-minio-creds: the MinIO IAM credentials the gateway daemon uses to
read and write the master seed at `prodbox/master-seed` per
@documents/engineering/secret_derivation_doctrine.md@ §6 (the
chart-generated row for `gateway-minio-creds`).

The MinIO IAM bootstrap (a one-shot Job or Pulumi program scheduled by
Sprint 2.19) re-grants this user `s3:GetObject`/`s3:PutObject`/
`s3:ListBucket` on `prodbox/*` on each cluster rebuild. The username and
password are generated once by `randAlphaNum` and persisted across helm
upgrades via the `lookup`-guarded pattern so the operator-host CLI and the
in-cluster gateway pods see stable values across reconcile cycles.

The master-seed itself is **not** rotated by this rotation: the bucket
contents live in MinIO and persist independently. If the operator wipes
MinIO (e.g. by clearing PV state), the gateway re-creates the master seed
on next startup under the `Prodbox.Secret.MasterSeed.ensureMasterSeed`
list-then-put guard.
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "gateway-minio-creds" -}}
{{- $username := "" -}}
{{- $password := "" -}}
{{- if and $existing $existing.data -}}
  {{- $username = index $existing.data "MINIO_ACCESS_KEY_ID" | b64dec -}}
  {{- $password = index $existing.data "MINIO_SECRET_ACCESS_KEY" | b64dec -}}
{{- end -}}
{{- if eq $username "" -}}
  {{- $username = printf "prodbox-gateway-%s" (randAlphaNum 8 | lower) -}}
{{- end -}}
{{- if eq $password "" -}}
  {{- $password = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: gateway-minio-creds
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  MINIO_ACCESS_KEY_ID: {{ $username | quote }}
  MINIO_SECRET_ACCESS_KEY: {{ $password | quote }}
